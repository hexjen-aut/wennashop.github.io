<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boutique — WennaShop</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
<link rel="apple-touch-icon" href="/icon-192.png">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/Supabase.config.js"></script>
<script src="/wenna-seo.js"></script>
<style>
:root {
  --accent: #ff751f;
  --accent-dark: #cc5e18;
  --accent-light: rgba(255,117,31,0.12);
  --bg: #0a0a0a;
  --surface: #141414;
  --surface-2: #1e1e1e;
  --border: #2a2a2a;
  --text: #ffffff;
  --text-muted: #a0a0a0;
  --text-faint: #555555;
  --success: #22c55e;
  --success-dim: rgba(34,197,94,0.12);
  --error: #ef4444;
  --gold: #f59e0b;
  --gold-dim: rgba(245,158,11,0.12);
  --font: 'Nunito', 'Varela Round', system-ui, sans-serif;
  --radius-sm: 6px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 24px;
  --radius-pill: 9999px;
  --shadow-md: 0 4px 16px rgba(0,0,0,.5);
  --shadow-orange: 0 4px 24px rgba(255,117,31,.25);
  --nav-height: 64px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 15px;
  line-height: 1.6;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── NAV ── */
.nav {
  position: sticky;
  top: 0;
  z-index: 100;
  height: var(--nav-height);
  background: rgba(20,20,20,0.95);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 24px;
  gap: 16px;
}
.logo {
  font-family: var(--font);
  font-size: 22px;
  font-weight: 900;
  color: var(--text);
  text-decoration: none;
  letter-spacing: -0.5px;
}
.logo span { color: var(--accent); }
.nav-back {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-muted);
  text-decoration: none;
  padding: 6px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius-pill);
  transition: all 200ms;
}
.nav-back:hover { color: var(--text); border-color: var(--accent); }
.nav-cart {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  font-weight: 700;
  color: #fff;
  text-decoration: none;
  background: var(--accent);
  padding: 8px 18px;
  border-radius: var(--radius-pill);
  transition: background 200ms, box-shadow 200ms;
  margin-left: auto;
}
.nav-cart:hover { background: var(--accent-dark); box-shadow: var(--shadow-orange); }

/* ── BANNER ── */
.banner-wrap {
  position: relative;
  height: 320px;
  overflow: hidden;
  background: var(--surface);
}
.banner-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  opacity: 0.5;
}
.banner-placeholder {
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, var(--surface) 0%, var(--surface-2) 60%, var(--surface) 100%);
  display: flex;
  align-items: center;
  justify-content: center;
}
.banner-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, rgba(10,10,10,0.96) 0%, rgba(10,10,10,0.3) 55%, transparent 100%);
}

/* ── SHOP HEADER ── */
.shop-header {
  max-width: 1200px;
  margin: -72px auto 0;
  padding: 0 24px;
  position: relative;
}
.shop-meta {
  display: flex;
  align-items: flex-end;
  gap: 20px;
  flex-wrap: wrap;
}
.shop-logo {
  width: 96px;
  height: 96px;
  border-radius: var(--radius-lg);
  border: 3px solid var(--bg);
  background: var(--surface-2);
  object-fit: cover;
  flex-shrink: 0;
  box-shadow: var(--shadow-md);
}
.shop-logo-placeholder {
  width: 96px;
  height: 96px;
  border-radius: var(--radius-lg);
  border: 3px solid var(--bg);
  background: var(--surface-2);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-family: var(--font);
  font-size: 32px;
  font-weight: 900;
  color: var(--accent);
  box-shadow: var(--shadow-md);
}
.shop-info { flex: 1; min-width: 200px; }
.shop-name {
  font-size: 28px;
  font-weight: 900;
  color: var(--text);
  line-height: 1.2;
  margin-bottom: 8px;
}
.shop-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 10px;
}
.tag {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: var(--radius-pill);
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.tag-verified { background: var(--gold-dim); color: var(--gold); border: 1px solid rgba(245,158,11,0.2); }
.tag-country { background: rgba(255,255,255,0.05); color: var(--text-muted); border: 1px solid var(--border); }
.tag-ships { background: var(--success-dim); color: var(--success); border: 1px solid rgba(34,197,94,0.15); }

.shop-stats {
  display: flex;
  gap: 24px;
  flex-wrap: wrap;
}
.stat { text-align: center; }
.stat-val {
  font-size: 22px;
  font-weight: 900;
  color: var(--text);
  display: block;
  line-height: 1;
}
.stat-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-faint);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-top: 2px;
}

.shop-actions {
  display: flex;
  gap: 10px;
  align-items: flex-end;
  flex-wrap: wrap;
  padding-bottom: 4px;
}
.btn-contact {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 10px 20px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--radius-pill);
  font-size: 14px;
  font-weight: 700;
  font-family: var(--font);
  cursor: pointer;
  text-decoration: none;
  transition: background 200ms, box-shadow 200ms;
}
.btn-contact:hover { background: var(--accent-dark); box-shadow: var(--shadow-orange); }
.btn-follow {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 10px 20px;
  background: transparent;
  color: var(--text-muted);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-pill);
  font-size: 14px;
  font-weight: 700;
  font-family: var(--font);
  cursor: pointer;
  transition: all 200ms;
}
.btn-follow:hover { border-color: var(--accent); color: var(--text); }
.social-links { display: flex; gap: 8px; }
.social-btn {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  border: 1.5px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-muted);
  text-decoration: none;
  transition: all 200ms;
}
.social-btn:hover { border-color: var(--accent); color: var(--accent); }

/* ── DIVIDER ── */
.divider {
  height: 1px;
  background: var(--border);
  margin: 28px auto;
  max-width: 1200px;
}

/* ── MAIN ── */
.main {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 24px 80px;
  display: grid;
  grid-template-columns: 268px 1fr;
  gap: 32px;
  align-items: start;
}

/* ── SIDEBAR ── */
.sidebar { position: sticky; top: 80px; display: flex; flex-direction: column; gap: 14px; }
.side-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 18px 20px;
}
.side-title {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-faint);
  margin-bottom: 14px;
}
.shop-bio {
  font-size: 14px;
  font-weight: 500;
  color: var(--text-muted);
  line-height: 1.7;
}
.info-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 0;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
  color: var(--text-muted);
}
.info-row:last-child { border-bottom: none; }
.info-row svg { flex-shrink: 0; color: var(--text-faint); }
.info-row strong { color: var(--text); font-weight: 700; }

.ships-list { display: flex; flex-wrap: wrap; gap: 6px; }
.ship-tag {
  font-size: 11px;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: var(--radius-pill);
  background: var(--success-dim);
  color: var(--success);
  border: 1px solid rgba(34,197,94,0.2);
}
.rating-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 6px;
}
.stars { color: var(--gold); font-size: 15px; letter-spacing: 2px; }
.rating-val {
  font-size: 20px;
  font-weight: 900;
  color: var(--text);
}
.rating-count { font-size: 12px; font-weight: 600; color: var(--text-faint); }

/* ── CATALOGUE ── */
.cat-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 18px;
  flex-wrap: wrap;
  gap: 12px;
}
.cat-title {
  font-size: 22px;
  font-weight: 900;
  color: var(--text);
}
.cat-count { font-size: 13px; font-weight: 600; color: var(--text-faint); }

/* Filtres */
.filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
.filter-btn {
  padding: 6px 16px;
  border-radius: var(--radius-pill);
  font-size: 13px;
  font-weight: 700;
  font-family: var(--font);
  border: 1.5px solid var(--border);
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 200ms;
}
.filter-btn:hover { border-color: var(--accent); color: var(--text); }
.filter-btn.active { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }

/* Search */
.search-row { display: flex; gap: 10px; margin-bottom: 20px; }
.search-input {
  flex: 1;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-pill);
  padding: 10px 18px;
  color: var(--text);
  font-size: 14px;
  font-weight: 500;
  font-family: var(--font);
  outline: none;
  transition: border-color 200ms, box-shadow 200ms;
}
.search-input::placeholder { color: var(--text-faint); }
.search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(255,117,31,0.12); }
.sort-select {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-pill);
  padding: 10px 18px;
  color: var(--text-muted);
  font-size: 13px;
  font-weight: 600;
  font-family: var(--font);
  outline: none;
  cursor: pointer;
  min-width: 150px;
  transition: border-color 200ms;
}
.sort-select:focus { border-color: var(--accent); }

/* Grille produits */
.products-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(196px, 1fr));
  gap: 16px;
}
.product-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  transition: all 200ms;
  cursor: pointer;
  text-decoration: none;
  display: block;
}
.product-card:hover {
  border-color: var(--accent);
  transform: translateY(-3px);
  box-shadow: var(--shadow-orange);
}
.product-img-wrap {
  position: relative;
  aspect-ratio: 1;
  overflow: hidden;
  background: var(--surface-2);
}
.product-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 320ms;
}
.product-card:hover .product-img { transform: scale(1.04); }
.product-img-placeholder {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--surface-2);
  color: var(--text-faint);
}

.product-badge {
  position: absolute;
  top: 10px;
  left: 10px;
  font-size: 10px;
  font-weight: 800;
  padding: 3px 8px;
  border-radius: var(--radius-pill);
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.badge-new { background: var(--accent); color: #fff; }
.badge-promo { background: var(--gold); color: #0a0a0a; }
.badge-stock-low { background: rgba(239,68,68,0.15); color: #fc6a6a; border: 1px solid rgba(239,68,68,0.2); }

.product-body { padding: 14px; }
.product-name {
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 6px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  line-height: 1.4;
}
.product-price-row {
  display: flex;
  align-items: baseline;
  gap: 8px;
  margin-bottom: 10px;
}
.product-price {
  font-size: 18px;
  font-weight: 900;
  color: var(--accent);
}
.product-compare {
  font-size: 13px;
  font-weight: 500;
  color: var(--text-faint);
  text-decoration: line-through;
}
.product-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-faint);
}
.product-country { display: flex; align-items: center; gap: 4px; }
.btn-add {
  width: 28px;
  height: 28px;
  border-radius: var(--radius-sm);
  background: var(--accent-light);
  border: 1px solid rgba(255,117,31,0.25);
  color: var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 200ms;
}
.btn-add:hover { background: var(--accent); color: #fff; }

/* Empty state */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-faint);
}
.empty-state svg { margin: 0 auto 12px; display: block; }
.empty-state p { font-size: 14px; font-weight: 600; }

/* Loading skeleton */
.skeleton {
  background: linear-gradient(90deg, var(--surface) 25%, var(--surface-2) 50%, var(--surface) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.4s infinite;
  border-radius: var(--radius-sm);
}
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
.sk-card { border-radius: var(--radius-lg); overflow: hidden; border: 1px solid var(--border); }
.sk-img { aspect-ratio: 1; width: 100%; }
.sk-body { padding: 14px; display: flex; flex-direction: column; gap: 8px; }
.sk-line { height: 12px; border-radius: 6px; }
.sk-line.w80 { width: 80%; }
.sk-line.w50 { width: 50%; }
.sk-line.w30 { width: 30%; }

/* Reviews */
.reviews-section { margin-top: 32px; }
.review-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 18px 20px;
  margin-bottom: 12px;
  transition: border-color 200ms;
}
.review-card:hover { border-color: rgba(255,117,31,0.3); }
.review-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
}
.review-avatar {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  background: var(--surface-2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 900;
  color: var(--accent);
  flex-shrink: 0;
}
.review-name { font-size: 14px; font-weight: 700; color: var(--text); }
.review-date { font-size: 12px; font-weight: 600; color: var(--text-faint); margin-left: auto; }
.review-stars { color: var(--gold); font-size: 13px; letter-spacing: 1px; }
.review-text { font-size: 13px; font-weight: 500; color: var(--text-muted); line-height: 1.6; }

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 12px 20px;
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 10px;
  z-index: 999;
  transform: translateY(80px);
  opacity: 0;
  transition: all 280ms cubic-bezier(0.34, 1.56, 0.64, 1);
  pointer-events: none;
}
.toast.show { transform: translateY(0); opacity: 1; }
.toast svg { color: var(--success); }

/* ── RESPONSIVE ── */
@media (max-width: 768px) {
  .main {
    grid-template-columns: 1fr;
    padding: 0 16px 60px;
  }
  .sidebar { position: static; }
  .banner-wrap { height: 200px; }
  .shop-meta { flex-direction: column; align-items: flex-start; }
  .shop-logo, .shop-logo-placeholder { width: 80px; height: 80px; font-size: 26px; }
  .shop-name { font-size: 22px; }
  .products-grid { grid-template-columns: repeat(auto-fill, minmax(148px, 1fr)); }
  .nav-back span { display: none; }
}
</style>
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <a href="boutique.html" class="nav-back">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    <span>Catalogue</span>
  </a>
  <a href="boutique.html" class="logo"><span>Wenna</span>Shop</a>
  <a href="panier.html" class="nav-cart">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
    <span id="cart-count">Panier</span>
  </a>
</nav>

<!-- BANNER -->
<div class="banner-wrap" id="banner-wrap">
  <div class="banner-placeholder" id="banner-placeholder">
    <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
  </div>
  <div class="banner-overlay"></div>
</div>

<!-- SHOP HEADER -->
<div class="shop-header">
  <div class="shop-meta">
    <div class="shop-logo-placeholder" id="shop-logo-el">W</div>
    <div class="shop-info">
      <h1 class="shop-name" id="shop-name">Chargement...</h1>
      <div class="shop-tags" id="shop-tags"></div>
      <div class="shop-stats" id="shop-stats"></div>
    </div>
    <div class="shop-actions" id="shop-actions"></div>
  </div>
</div>

<div class="divider"></div>

<!-- MAIN -->
<div class="main">

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <div class="side-card" id="bio-card" style="display:none">
      <div class="side-title">À propos</div>
      <p class="shop-bio" id="shop-bio"></p>
    </div>

    <div class="side-card">
      <div class="side-title">Informations</div>
      <div id="info-rows">
        <div class="info-row skeleton" style="height:32px;border:none;margin:4px 0;"></div>
        <div class="info-row skeleton" style="height:32px;border:none;margin:4px 0;"></div>
        <div class="info-row skeleton" style="height:32px;border:none;margin:4px 0;"></div>
      </div>
    </div>

    <div class="side-card" id="ships-card" style="display:none">
      <div class="side-title">Expédie vers</div>
      <div class="ships-list" id="ships-list"></div>
    </div>

    <div class="side-card" id="rating-card" style="display:none">
      <div class="side-title">Évaluations</div>
      <div class="rating-row">
        <span class="stars" id="stars-display">★★★★★</span>
        <span class="rating-val" id="rating-val">5.0</span>
      </div>
      <span class="rating-count" id="rating-count">0 avis</span>
    </div>

  </aside>

  <!-- CATALOGUE -->
  <section class="catalogue">

    <div class="cat-top">
      <div>
        <h2 class="cat-title">Catalogue</h2>
        <span class="cat-count" id="products-count">Chargement...</span>
      </div>
    </div>

    <div class="filters" id="filters">
      <button class="filter-btn active" data-cat="all">Tout</button>
    </div>

    <div class="search-row">
      <input type="text" class="search-input" id="search-input" placeholder="Rechercher un produit...">
      <select class="sort-select" id="sort-select">

// ── FLAGS ──
const FLAGS = {
  'Maroc':'🇲🇦','Gabon':'🇬🇦','Sénégal':'🇸🇳',"Côte d'Ivoire":'🇨🇮',
  'Cameroun':'🇨🇲','Burkina Faso':'🇧🇫','Mali':'🇲🇱','Togo':'🇹🇬',
  'Bénin':'🇧🇯','Niger':'🇳🇪','Congo':'🇨🇬','RDC':'🇨🇩',
  'Tunisie':'🇹🇳','Madagascar':'🇲🇬','Senegal':'🇸🇳','Cote d Ivoire':'🇨🇮'
};
function flag(c) { return FLAGS[c] || '🌍'; }

// ── UTILS ──
function getParam() {
  const p = new URLSearchParams(window.location.search);
  return {
    slug: p.get('slug'),
    id: p.get('id'),
    vendeur: p.get('vendeur')
  };
}
function formatPrice(amount, currency) {
  const cur = currency === 'XOF' || currency === 'FCFA' ? 'XOF' : (currency || 'MAD');
  return new Intl.NumberFormat('fr-FR', { style: 'currency', currency: cur, maximumFractionDigits: 0 }).format(amount);
}
function starsHTML(n) {
  const full = Math.round(n || 0);
  return '★'.repeat(full) + '☆'.repeat(5 - full);
}
function showToast(msg) {
  const t = document.getElementById('toast');
  document.getElementById('toast-msg').textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}
function initials(name) {
  if (!name) return 'W';
  return name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
}
function waitForDb() {
  return new Promise(resolve => {
    if (window.db) return resolve(window.db);
    const t = setInterval(() => { if (window.db) { clearInterval(t); resolve(window.db); } }, 80);
  });
}

// ── STATE ──
let allProducts = [];
let currentCat = 'all';
let searchVal = '';
let sortVal = 'newest';
let shopData = null;

// ── LOAD SHOP ──
async function loadShop() {
  const db = await waitForDb();
  const { slug, id, vendeur } = getParam();
  const select = '*, users(id, full_name, email, specialty, avatar_url, city, country, created_at)';

  if (slug) {
    const { data } = await db.from('shops').select(select).eq('slug', slug).eq('status', 'active').single();
    shopData = data;
  } else if (id) {
    const { data } = await db.from('shops').select(select).eq('id', id).single();
    shopData = data;
  } else if (vendeur) {
    const { data } = await db.from('shops').select(select).eq('user_id', vendeur).eq('status', 'active').single();
    shopData = data;
  }

  if (!shopData) { renderShopError(); return; }

  renderShopHeader(shopData);
  await loadProducts(shopData.user_id);
  await loadReviews(shopData.user_id);
}

// ── RENDER HEADER ──
function renderShopHeader(s) {
  // Banner
  if (s.banner_url) {
    const bw = document.getElementById('banner-wrap');
    const img = document.createElement('img');
    img.className = 'banner-img';
    img.src = s.banner_url;
    img.alt = s.name;
    bw.insertBefore(img, bw.firstChild);
    document.getElementById('banner-placeholder').style.display = 'none';
  }

  // Logo
  const logoEl = document.getElementById('shop-logo-el');
  if (s.logo_url) {
    logoEl.outerHTML = `<img class="shop-logo" src="${s.logo_url}" alt="${s.name}">`;
  } else {
    logoEl.textContent = initials(s.name);
  }

  // Name
  document.getElementById('shop-name').textContent = s.name;

  // Tags
  let tagsHTML = '';
  if (s.is_verified) tagsHTML += `<span class="tag tag-verified">${SVG.verified} Boutique vérifiée</span>`;
  if (s.country) tagsHTML += `<span class="tag tag-country">${flag(s.country)} ${s.country}</span>`;
  if (s.city) tagsHTML += `<span class="tag tag-country">${SVG.location} ${s.city}</span>`;
  document.getElementById('shop-tags').innerHTML = tagsHTML;

  // Stats
  document.getElementById('shop-stats').innerHTML = `
    <div class="stat"><span class="stat-val">${s.total_sales || 0}</span><span class="stat-label">Ventes</span></div>
    <div class="stat"><span class="stat-val">${s.rating_avg ? s.rating_avg.toFixed(1) : '—'}</span><span class="stat-label">Note</span></div>
    <div class="stat"><span class="stat-val">${s.rating_count || 0}</span><span class="stat-label">Avis</span></div>
  `;

  // Actions
  let actHTML = '';
  if (s.whatsapp) {
    actHTML += `<a href="https://wa.me/${s.whatsapp.replace(/\D/g,'')}" target="_blank" class="btn-contact">${SVG.chat} Contacter</a>`;
  }
  actHTML += `<button class="btn-follow" onclick="toggleFollow()">${SVG.heart} Suivre</button>`;
  const socials = [];
  if (s.instagram) socials.push(`<a href="https://instagram.com/${s.instagram.replace('@','')}" target="_blank" class="social-btn" title="Instagram">${SVG.ig}</a>`);
  if (s.facebook) socials.push(`<a href="${s.facebook}" target="_blank" class="social-btn" title="Facebook">${SVG.fb}</a>`);
  if (s.tiktok) socials.push(`<a href="https://tiktok.com/@${s.tiktok}" target="_blank" class="social-btn" title="TikTok">${SVG.tt}</a>`);
  if (socials.length) actHTML += `<div class="social-links">${socials.join('')}</div>`;
  document.getElementById('shop-actions').innerHTML = actHTML;

  // Bio
  if (s.bio) {
    document.getElementById('shop-bio').textContent = s.bio;
    document.getElementById('bio-card').style.display = 'block';
  }

  // Info rows
  const specialty = s.users?.specialty || '';
  const memberSince = s.created_at ? new Date(s.created_at).toLocaleDateString('fr-FR', { month: 'long', year: 'numeric' }) : '';
  let infoHTML = '';
  if (specialty) infoHTML += `<div class="info-row">${SVG.specialty}<div><span style="color:var(--text-faint);font-size:11px;font-weight:600">Spécialité</span><br><strong>${specialty}</strong></div></div>`;
  if (memberSince) infoHTML += `<div class="info-row">${SVG.calendar}<div><span style="color:var(--text-faint);font-size:11px;font-weight:600">Membre depuis</span><br><strong>${memberSince}</strong></div></div>`;
  if (s.shop_policies) infoHTML += `<div class="info-row">${SVG.policy}<div><span style="color:var(--text-faint);font-size:11px;font-weight:600">Politique</span><br><strong style="font-size:12px;font-weight:500;color:var(--text-muted)">${s.shop_policies}</strong></div></div>`;
  if (!infoHTML) infoHTML = `<div class="info-row">${SVG.store}<div><strong>Artisan WennaShop</strong></div></div>`;
  document.getElementById('info-rows').innerHTML = infoHTML;

  // Ships to
  if (s.ships_to && s.ships_to.length) {
    document.getElementById('ships-list').innerHTML = s.ships_to.map(c => `<span class="ship-tag">${flag(c)} ${c}</span>`).join('');
    document.getElementById('ships-card').style.display = 'block';
  }

  // Rating
  if (s.rating_count > 0) {
    document.getElementById('stars-display').textContent = starsHTML(s.rating_avg);
    document.getElementById('rating-val').textContent = (s.rating_avg || 0).toFixed(1);
    document.getElementById('rating-count').textContent = `${s.rating_count} avis`;
    document.getElementById('rating-card').style.display = 'block';
  }
}

// ── PRODUCTS ──
async function loadProducts(userId) {
  const db = await waitForDb();
  const { data, error } = await db.from('products')
    .select('*, categories(name)')
    .eq('seller_id', userId)
    .eq('status', 'active')
    .order('created_at', { ascending: false });

  if (error || !data) {
    document.getElementById('products-grid').innerHTML = `<div class="empty-state" style="grid-column:1/-1">${SVG.emptyBox}<p>Aucun produit disponible</p></div>`;
    // SEO même sans produits
    if (shopData) WennaSEO.vendeur(shopData, []);
    return;
  }

  allProducts = data;
  buildFilters(data);
  renderProducts();
  document.getElementById('products-count').textContent = `${data.length} produit${data.length > 1 ? 's' : ''}`;

  // ── SEO DYNAMIQUE ── injecté ici après chargement complet boutique + produits
  if (shopData) WennaSEO.vendeur(shopData, data);
}

function buildFilters(products) {
  const cats = [...new Set(products.map(p => p.categories?.name).filter(Boolean))];
  const filtersEl = document.getElementById('filters');
  cats.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.dataset.cat = cat;
    btn.textContent = cat;
    btn.addEventListener('click', () => setFilter(cat));
    filtersEl.appendChild(btn);
  });
}

function setFilter(cat) {
  currentCat = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
  renderProducts();
}

function renderProducts() {
  let filtered = [...allProducts];
  if (currentCat !== 'all') filtered = filtered.filter(p => p.categories?.name === currentCat);
  if (searchVal) {
    const q = searchVal.toLowerCase();
    filtered = filtered.filter(p => p.name.toLowerCase().includes(q) || (p.description || '').toLowerCase().includes(q));
  }
  if (sortVal === 'price_asc') filtered.sort((a, b) => a.price - b.price);
  else if (sortVal === 'price_desc') filtered.sort((a, b) => b.price - a.price);
  else if (sortVal === 'name') filtered.sort((a, b) => a.name.localeCompare(b.name));
  else filtered.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

  const grid = document.getElementById('products-grid');
  if (!filtered.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">${SVG.empty}<p>Aucun produit correspondant</p></div>`;
    return;
  }

  grid.innerHTML = filtered.map(p => {
    const isNew = (Date.now() - new Date(p.created_at)) < 1000 * 60 * 60 * 24 * 7;
    const hasPromo = p.compare_price && p.compare_price > p.price;
    const lowStock = p.stock > 0 && p.stock <= 3;
    let badge = '';
    if (hasPromo) badge = `<span class="product-badge badge-promo">-${Math.round((1 - p.price / p.compare_price) * 100)}%</span>`;
    else if (isNew) badge = `<span class="product-badge badge-new">Nouveau</span>`;
    else if (lowStock) badge = `<span class="product-badge badge-stock-low">${p.stock} restant${p.stock > 1 ? 's' : ''}</span>`;

    const imgContent = p.image_url
      ? `<img class="product-img" src="${p.image_url}" alt="${p.name}" loading="lazy">`
      : `<div class="product-img-placeholder">${SVG.image}</div>`;

    return `<a class="product-card" href="produit.html?id=${p.id}">
      <div class="product-img-wrap">${imgContent}${badge}</div>
      <div class="product-body">
        <div class="product-name">${p.name}</div>
        <div class="product-price-row">
          <span class="product-price">${formatPrice(p.price, p.currency)}</span>
          ${hasPromo ? `<span class="product-compare">${formatPrice(p.compare_price, p.currency)}</span>` : ''}
        </div>
        <div class="product-meta">
          <span class="product-country">${flag(p.country || '')} ${p.country || ''}</span>
          <button class="btn-add" onclick="addToCart(event,'${p.id}','${p.name.replace(/'/g,"\\'")}')">
            ${SVG.add}
          </button>
        </div>
      </div>
    </a>`;
  }).join('');
}

// ── CART ──
async function addToCart(e, productId, productName) {
  e.preventDefault();
  e.stopPropagation();
  const db = await waitForDb();
  const { data: { session } } = await db.auth.getSession();
  if (!session) {
    showToast('Connectez-vous pour ajouter au panier');
    setTimeout(() => window.location.href = 'login.html', 1200);
    return;
  }
  const { data: user } = await db.from('users').select('id').eq('auth_id', session.user.id).single();
  if (!user) return;
  const { error } = await db.from('cart_items').upsert(
    { user_id: user.id, product_id: productId, quantity: 1 },
    { onConflict: 'user_id,product_id', ignoreDuplicates: false }
  );
  if (!error) showToast(`"${productName}" ajouté au panier`);
}

// ── REVIEWS ──
async function loadReviews(userId) {
  const db = await waitForDb();
  const { data } = await db.from('reviews')
    .select('*, products!inner(seller_id)')
    .eq('products.seller_id', userId)
    .eq('status', 'approved')
    .order('created_at', { ascending: false })
    .limit(6);

  if (!data || !data.length) return;

  document.getElementById('reviews-section').style.display = 'block';
  document.getElementById('reviews-list').innerHTML = data.map(r => `
    <div class="review-card">
      <div class="review-header">
        <div class="review-avatar">${(r.reviewer_name || 'A')[0].toUpperCase()}</div>
        <div>
          <div class="review-name">${r.reviewer_name || 'Acheteur anonyme'}</div>
          <div class="review-stars">${starsHTML(r.rating)}</div>
        </div>
        <span class="review-date">${new Date(r.created_at).toLocaleDateString('fr-FR')}</span>
      </div>
      ${r.comment ? `<p class="review-text">${r.comment}</p>` : ''}
    </div>
  `).join('');
}

// ── FOLLOW ──
function toggleFollow() {
  const btn = document.querySelector('.btn-follow');
  const isFollowing = btn.dataset.following === '1';
  btn.dataset.following = isFollowing ? '0' : '1';
  btn.innerHTML = isFollowing
    ? `${SVG.heart} Suivre`
    : `${SVG.heartFilled} Suivi`;
  btn.style.color = isFollowing ? '' : '#fc6a6a';
  btn.style.borderColor = isFollowing ? '' : '#fc6a6a';
  showToast(isFollowing ? 'Boutique retirée des favoris' : 'Boutique ajoutée aux favoris');
}

// ── SHOP ERROR ──
function renderShopError() {
  document.getElementById('shop-name').textContent = 'Boutique introuvable';
  document.getElementById('shop-logo-el').textContent = '?';
  document.getElementById('products-grid').innerHTML = `
    <div class="empty-state" style="grid-column:1/-1">
      ${SVG.storeOff}
      <p>Cette boutique n'existe pas ou n'est plus disponible.</p>
    </div>`;
  document.getElementById('products-count').textContent = '';
  // noindex pour les boutiques introuvables
  WennaSEO.page({ title: 'Boutique introuvable', noIndex: true });
}

// ── CART COUNT ──
async function updateCartCount() {
  const db = await waitForDb();
  const { data: { session } } = await db.auth.getSession();
  if (!session) return;
  const { data: user } = await db.from('users').select('id').eq('auth_id', session.user.id).single();
  if (!user) return;
  const { count } = await db.from('cart_items').select('id', { count: 'exact', head: true }).eq('user_id', user.id);
  if (count > 0) document.getElementById('cart-count').textContent = `Panier (${count})`;
}
