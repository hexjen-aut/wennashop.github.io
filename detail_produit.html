<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Détail Produit — WennaShop</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/bold/style.css"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.config.js"></script>
<script src="js/cart.js"></script>
<style>
:root {
  --accent:        #ff751f;
  --accent-dark:   #cc5e18;
  --accent-light:  rgba(255,117,31,.12);
  --bg:            #0a0a0a;
  --surface:       #141414;
  --surface-2:     #1e1e1e;
  --border:        #2a2a2a;
  --border-accent: rgba(255,117,31,.3);
  --text:          #ffffff;
  --text-muted:    #a0a0a0;
  --text-faint:    #555555;
  --success:       #22c55e;
  --error:         #ef4444;
  --gold:          #f59e0b;
  --font:          'Nunito','Varela Round',system-ui,sans-serif;
  --radius-sm:     6px;
  --radius-md:     12px;
  --radius-lg:     16px;
  --radius-pill:   9999px;
  --shadow-orange: 0 4px 24px rgba(255,117,31,.2);
  --nav-height:    60px;
}
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  overflow-x: hidden;
  padding-bottom: 88px;
}
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--surface); }
::-webkit-scrollbar-thumb { background: rgba(255,117,31,.3); border-radius: 99px; }

/* ── NAV ── */
.nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  height: var(--nav-height);
  background: rgba(10,10,10,.95);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
}
.nav-inner {
  max-width: 800px;
  margin: 0 auto;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.nav-btn {
  background: none;
  border: none;
  color: var(--text-muted);
  display: flex;
  align-items: center;
  justify-content: center;
  width: 36px;
  height: 36px;
  border-radius: var(--radius-md);
  transition: color .2s, background .2s;
  font-size: 20px;
}
.nav-btn:hover { color: var(--accent); background: var(--accent-light); }
.nav-logo img { height: 32px; }
.cart-wrap { position: relative; }
.cart-badge {
  position: absolute;
  top: -4px; right: -4px;
  background: var(--accent);
  color: #fff;
  font-size: 9px;
  font-weight: 800;
  width: 16px; height: 16px;
  border-radius: 50%;
  display: none;
  align-items: center;
  justify-content: center;
  font-family: var(--font);
}
.cart-badge.show { display: flex; }

/* ── SKELETON ── */
@keyframes shimmer {
  0%   { background-position: -600px 0; }
  100% { background-position:  600px 0; }
}
.skeleton {
  background: linear-gradient(90deg, var(--surface) 25%, var(--surface-2) 50%, var(--surface) 75%);
  background-size: 600px 100%;
  animation: shimmer 1.4s infinite linear;
  border-radius: var(--radius-md);
}

/* ── TOAST ── */
#toast {
  position: fixed;
  bottom: 100px; left: 50%;
  transform: translateX(-50%) translateY(10px);
  z-index: 400;
  background: var(--surface);
  border: 1.5px solid var(--border-accent);
  border-radius: var(--radius-pill);
  color: var(--text);
  padding: 10px 20px;
  font-size: 13px;
  font-weight: 700;
  font-family: var(--font);
  opacity: 0;
  pointer-events: none;
  transition: opacity .3s, transform .3s;
  white-space: nowrap;
  box-shadow: var(--shadow-orange);
}
#toast.show  { opacity: 1; transform: translateX(-50%) translateY(0); }
#toast.ok    { border-color: rgba(34,197,94,.4); background: #061210; }
#toast.ko    { border-color: rgba(239,68,68,.4);  background: #130606; }

main { padding-top: var(--nav-height); }
.page-wrap { max-width: 800px; margin: 0 auto; }

/* ── GALLERY ── */
.gallery {
  display: grid;
  grid-template-columns: 1fr 180px;
  gap: 3px;
  height: 420px;
}
@media (max-width: 768px) {
  .gallery { grid-template-columns: 1fr; height: 280px; }
  .thumbs-col { display: none; }
}
.main-img-wrap {
  position: relative;
  overflow: hidden;
  background: var(--surface);
  border-radius: var(--radius-lg) 0 0 var(--radius-lg);
}
@media (max-width: 768px) {
  .main-img-wrap { border-radius: 0; }
}
.main-img-wrap img {
  width: 100%; height: 100%;
  object-fit: cover;
  transition: transform .5s ease;
}
.main-img-wrap:hover img { transform: scale(1.03); }

.origin-badge {
  position: absolute;
  bottom: 14px; left: 14px;
  background: rgba(10,10,10,.88);
  backdrop-filter: blur(10px);
  border: 1px solid var(--border-accent);
  border-radius: var(--radius-pill);
  color: var(--accent);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .06em;
  text-transform: uppercase;
  padding: 5px 14px;
}

.thumbs-col {
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.thumb {
  flex: 1;
  overflow: hidden;
  background: var(--surface);
  position: relative;
  cursor: pointer;
  border-radius: var(--radius-sm);
}
.thumb img {
  width: 100%; height: 100%;
  object-fit: cover;
  transition: opacity .2s, transform .4s;
}
.thumb:hover img { opacity: .75; transform: scale(1.06); }
.thumb-more {
  position: absolute;
  inset: 0;
  background: rgba(10,10,10,.65);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 800;
  color: var(--text);
}

/* ── CONTENT ── */
.content {
  padding: 28px 24px 0;
}
@media (max-width: 768px) { .content { padding: 20px 16px 0; } }

.eyebrow {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--accent);
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}
.eyebrow::before {
  content: '';
  display: block;
  width: 16px; height: 2px;
  background: var(--accent);
  border-radius: 99px;
}

.product-title {
  font-size: clamp(24px, 4vw, 40px);
  font-weight: 900;
  line-height: 1.1;
  letter-spacing: -.5px;
  margin-bottom: 16px;
}

.price-row {
  display: flex;
  align-items: baseline;
  gap: 10px;
  margin-bottom: 6px;
}
.price {
  font-size: 30px;
  font-weight: 900;
  color: var(--accent);
}
.compare-price {
  font-size: 18px;
  font-weight: 600;
  color: var(--text-faint);
  text-decoration: line-through;
}
.rating {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-muted);
  margin-bottom: 20px;
}

/* ── CHIPS ── */
.chips {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 24px;
}
.chip {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--surface-2);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-pill);
  padding: 7px 14px;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-muted);
  transition: border-color .2s;
}
.chip i { font-size: 14px; color: var(--accent); }
.chip:hover { border-color: var(--border-accent); }

/* ── SPECS ── */
.specs-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 3px;
  margin-bottom: 24px;
}
@media (min-width: 600px) { .specs-grid { grid-template-columns: repeat(3, 1fr); } }
.spec-item {
  background: var(--surface-2);
  border-radius: var(--radius-md);
  padding: 12px 16px;
}
.spec-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--text-faint);
  margin-bottom: 5px;
}
.spec-value {
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
}

/* ── TAGS ── */
.tags-row {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 24px;
}
.tag {
  display: inline-block;
  background: var(--accent-light);
  border: 1px solid var(--border-accent);
  border-radius: var(--radius-pill);
  color: var(--accent);
  font-size: 11px;
  font-weight: 700;
  padding: 4px 12px;
}

/* ── DESCRIPTION ── */
.section-title {
  font-size: 18px;
  font-weight: 800;
  margin-bottom: 10px;
}
.description {
  font-size: 14px;
  font-weight: 500;
  color: var(--text-muted);
  line-height: 1.8;
  max-width: 600px;
  margin-bottom: 32px;
}

.divider { height: 1px; background: var(--border); margin: 28px 0; }

/* ── SELLER ── */
.seller-card {
  background: var(--surface-2);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 18px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 14px;
  margin-bottom: 12px;
  flex-wrap: wrap;
  transition: border-color .2s;
}
.seller-card:hover { border-color: var(--border-accent); }
.seller-av {
  width: 46px; height: 46px;
  border-radius: 50%;
  background: var(--accent-light);
  border: 1.5px solid var(--border-accent);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: 800;
  color: var(--accent);
  flex-shrink: 0;
  overflow: hidden;
}
.seller-av img { width: 100%; height: 100%; object-fit: cover; }
.seller-name { font-size: 14px; font-weight: 800; margin-bottom: 3px; }
.seller-meta {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .05em;
  text-transform: uppercase;
  color: var(--text-faint);
}
.btn-seller {
  background: transparent;
  border: 1.5px solid var(--border-accent);
  border-radius: var(--radius-pill);
  color: var(--accent);
  padding: 8px 18px;
  font-size: 12px;
  font-weight: 700;
  font-family: var(--font);
  transition: all .2s;
  white-space: nowrap;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.btn-seller:hover { background: var(--accent-light); }

/* ── LIVRAISON INFO ── */
.delivery-info {
  background: var(--surface-2);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 14px 18px;
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 36px;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-muted);
}
.delivery-info i { font-size: 20px; color: var(--text-faint); flex-shrink: 0; }

/* ── REVIEWS ── */
.reviews-section { margin-bottom: 36px; }
.review-card {
  background: var(--surface-2);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 16px 18px;
  margin-bottom: 6px;
  transition: border-color .2s;
}
.review-card:hover { border-color: var(--border-accent); }
.review-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 8px;
}
.reviewer { font-size: 13px; font-weight: 800; }
.review-date { font-size: 11px; font-weight: 600; color: var(--text-faint); }
.stars { color: var(--gold); font-size: 13px; margin-bottom: 6px; }
.review-text { font-size: 13px; font-weight: 500; color: var(--text-muted); line-height: 1.7; }

/* ── RELATED ── */
.related-section { margin-bottom: 36px; }
.related-header {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 16px;
}
.related-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
}
@media (min-width: 600px) { .related-grid { grid-template-columns: repeat(4, 1fr); } }
.related-card {
  text-decoration: none;
  color: inherit;
  display: block;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  transition: border-color .2s, transform .2s;
}
.related-card:hover { border-color: var(--accent); transform: translateY(-2px); }
.related-img {
  aspect-ratio: 4/5;
  background: var(--surface-2);
  overflow: hidden;
}
.related-img img {
  width: 100%; height: 100%;
  object-fit: cover;
  transition: transform .5s ease;
}
.related-card:hover .related-img img { transform: scale(1.05); }
.related-info { padding: 10px 12px 12px; }
.related-country {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 3px;
}
.related-name {
  font-size: 13px;
  font-weight: 700;
  line-height: 1.3;
  margin-bottom: 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.related-price {
  font-size: 13px;
  font-weight: 800;
  color: var(--accent);
}

/* ── ERROR ── */
.error-state {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 60vh;
  text-align: center;
  padding: 40px;
  gap: 12px;
}
.error-state i { font-size: 48px; color: var(--text-faint); }
.error-title { font-size: 22px; font-weight: 800; }
.error-sub { font-size: 14px; font-weight: 500; color: var(--text-muted); }
.btn-back {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: transparent;
  border: 1.5px solid var(--border-accent);
  border-radius: var(--radius-pill);
  color: var(--accent);
  padding: 10px 22px;
  font-size: 13px;
  font-weight: 700;
  text-decoration: none;
  font-family: var(--font);
  transition: all .2s;
  margin-top: 8px;
}
.btn-back:hover { background: var(--accent-light); }

/* ── SKELETON LAYOUT ── */
.sk-gallery {
  display: grid;
  grid-template-columns: 1fr 180px;
  gap: 3px;
  height: 420px;
}
@media (max-width: 768px) {
  .sk-gallery { grid-template-columns: 1fr; height: 280px; }
  .sk-thumbs { display: none; }
}
.sk-thumbs { display: flex; flex-direction: column; gap: 3px; }
.sk-thumb { flex: 1; border-radius: var(--radius-sm); }
.sk-info { padding: 28px 24px 0; display: flex; flex-direction: column; gap: 10px; }
.sk-line { height: 12px; border-radius: 4px; }

/* ── BOTTOM BAR ── */
.bottom-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 100;
  background: rgba(10,10,10,.97);
  backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  padding: 12px 20px;
}
.bottom-bar-inner {
  max-width: 800px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  gap: 10px;
}
.btn-wish {
  width: 48px; height: 48px;
  background: transparent;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-md);
  color: var(--text-muted);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-size: 20px;
  transition: all .2s;
}
.btn-wish:hover { border-color: var(--border-accent); color: var(--accent); }
.btn-wish.active { border-color: var(--accent); background: var(--accent-light); color: var(--accent); }

.btn-cart {
  flex: 1;
  height: 48px;
  background: var(--accent);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  font-size: 14px;
  font-weight: 800;
  border: none;
  border-radius: var(--radius-pill);
  font-family: var(--font);
  box-shadow: var(--shadow-orange);
  transition: background .2s, transform .15s;
  letter-spacing: .02em;
}
.btn-cart:hover { background: var(--accent-dark); transform: translateY(-1px); }
.btn-cart:active { transform: translateY(0); }
</style>
</head>
<body>

<div id="toast"></div>

<!-- ── NAV ── -->
<nav class="nav">
  <div class="nav-inner">
    <button class="nav-btn" onclick="history.back()" aria-label="Retour">
      <i class="ph ph-arrow-left"></i>
    </button>
    <a href="boutique.html" class="nav-logo">
      <img src="wenna_logo01.png" alt="WennaShop"/>
    </a>
    <a href="panier.html" class="nav-btn cart-wrap" aria-label="Panier">
      <i class="ph ph-shopping-bag"></i>
      <span id="cart-badge" class="cart-badge">0</span>
    </a>
  </div>
</nav>

<main>
<div class="page-wrap">

  <!-- SKELETON -->
  <div id="skeleton-section">
    <div class="sk-gallery">
      <div class="skeleton" style="height:100%;border-radius:var(--radius-lg) 0 0 var(--radius-lg);"></div>
      <div class="sk-thumbs">
        <div class="skeleton sk-thumb"></div>
        <div class="skeleton sk-thumb"></div>
      </div>
    </div>
    <div class="sk-info">
      <div class="skeleton sk-line" style="width:80px;"></div>
      <div class="skeleton sk-line" style="width:55%;height:20px;"></div>
      <div class="skeleton sk-line" style="width:100px;height:16px;"></div>
      <div class="skeleton sk-line" style="width:100%;height:80px;margin-top:10px;"></div>
    </div>
  </div>

  <!-- PRODUCT -->
  <div id="product-section" style="display:none;">

    <div class="gallery">
      <div class="main-img-wrap">
        <img id="main-img" src="" alt=""/>
        <div class="origin-badge" id="origin-badge"></div>
      </div>
      <div class="thumbs-col" id="thumbs-col"></div>
    </div>

    <div class="content">

      <!-- TITRE + PRIX -->
      <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;margin-bottom:6px;">
        <div style="flex:1;min-width:0;">
          <div class="eyebrow" id="product-category"></div>
          <h1 class="product-title" id="product-title"></h1>
        </div>
        <div style="text-align:right;flex-shrink:0;">
          <div class="price-row">
            <div class="price" id="product-price"></div>
            <div class="compare-price" id="compare-price" style="display:none;"></div>
          </div>
          <div class="rating" id="rating-row" style="display:none;">
            <i class="ph ph-star" style="color:var(--gold);font-size:14px;"></i>
            <span id="avg-rating"></span>
            <span id="review-count-inline" style="color:var(--text-faint);"></span>
          </div>
        </div>
      </div>

      <!-- CHIPS -->
      <div class="chips" id="chips-container"></div>

      <!-- SPECS -->
      <div class="specs-grid" id="specs-grid" style="display:none;"></div>

      <!-- TAGS -->
      <div class="tags-row" id="tags-row" style="display:none;"></div>

      <!-- DESCRIPTION -->
      <div class="section-title">À propos de ce produit</div>
      <p class="description" id="product-description"></p>

      <div class="divider"></div>

      <!-- SELLER -->
      <div class="seller-card" id="seller-card">
        <div style="display:flex;align-items:center;gap:12px;">
          <div class="skeleton" style="width:46px;height:46px;border-radius:50%;flex-shrink:0;"></div>
          <div style="display:flex;flex-direction:column;gap:6px;">
            <div class="skeleton" style="width:120px;height:13px;border-radius:4px;"></div>
            <div class="skeleton" style="width:80px;height:10px;border-radius:4px;"></div>
          </div>
        </div>
      </div>

      <!-- LIVRAISON -->
      <div class="delivery-info">
        <i class="ph ph-package"></i>
        <span>La livraison est gérée directement par le vendeur. Contactez-le pour les délais et tarifs.</span>
      </div>

      <!-- REVIEWS -->
      <div class="reviews-section" id="reviews-section" style="display:none;">
        <div class="divider"></div>
        <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:16px;">
          <div class="section-title" style="margin-bottom:0;">Avis clients</div>
          <span id="reviews-count" style="font-size:12px;font-weight:700;color:var(--text-muted);"></span>
        </div>
        <div id="reviews-list"></div>
      </div>

      <!-- RELATED -->
      <div class="related-section" id="related-section" style="display:none;">
        <div class="divider"></div>
        <div class="related-header">
          <div class="section-title" style="margin-bottom:0;">Vous aimerez aussi</div>
          <a href="boutique.html" style="font-size:12px;font-weight:700;color:var(--accent);text-decoration:none;display:flex;align-items:center;gap:4px;">
            Voir tout <i class="ph ph-arrow-right" style="font-size:14px;"></i>
          </a>
        </div>
        <div class="related-grid" id="related-products"></div>
      </div>

    </div>
  </div>

  <!-- ERROR -->
  <div class="error-state" id="error-state">
    <i class="ph ph-magnifying-glass-minus"></i>
    <div class="error-title">Produit introuvable</div>
    <div class="error-sub">Ce produit n'existe pas ou a été retiré.</div>
    <a href="boutique.html" class="btn-back">
      <i class="ph ph-arrow-left" style="font-size:15px;"></i>
      Retour à la boutique
    </a>
  </div>

</div><!-- /page-wrap -->
</main>

<!-- BOTTOM BAR -->
<div class="bottom-bar">
  <div class="bottom-bar-inner">
    <button class="btn-wish" id="btn-wish" onclick="toggleWish()" aria-label="Ajouter aux favoris">
      <i class="ph ph-heart" id="wish-icon"></i>
    </button>
    <button class="btn-cart" onclick="addToCart()">
      <i class="ph ph-shopping-bag" style="font-size:18px;"></i>
      Ajouter au panier
    </button>
  </div>
</div>

<script>
// ── SUPABASE ──
function getDb() { return window.db }

let currentProduct = null
const $ = id => document.getElementById(id)

// ── UTILS ──
function getProductId() { return new URLSearchParams(window.location.search).get('id') }
function formatPrice(amount, currency = 'MAD') {
  return new Intl.NumberFormat('fr-FR', { style: 'currency', currency }).format(amount)
}
function showToast(msg, type = '') {
  const t = $('toast')
  t.textContent = msg
  t.className = type ? `show ${type}` : 'show'
  setTimeout(() => t.className = '', 3000)
}
function getImages(product) {
  if (product._images && product._images.length) return product._images.map(i => i.url)
  if (Array.isArray(product.images) && product.images.length) return product.images
  if (product.image_url) return [product.image_url]
  return []
}

// ── CART ──
async function updateBadge() {
  if (typeof Cart === 'undefined') return
  await Cart.updateBadge('cart-badge')
  $('cart-badge').classList.toggle('show', parseInt($('cart-badge').textContent) > 0)
}
async function addToCart() {
  if (!currentProduct) return
  if (typeof Cart === 'undefined') { showToast('Panier non disponible', 'ko'); return }
  const r = await Cart.add(currentProduct.id, currentProduct.name, currentProduct.price, currentProduct.image_url || '', currentProduct.currency || 'MAD')
  if (!r.success && r.error === 'not_logged_in') {
    showToast('Connecte-toi pour ajouter au panier', 'ko')
    setTimeout(() => window.location.href = 'index.html', 1500)
    return
  }
  showToast(r.success ? `« ${currentProduct.name} » ajouté au panier` : r.message, r.success ? 'ok' : 'ko')
  if (r.success) updateBadge()
}

// ── WISHLIST ──
function toggleWish() {
  const btn = $('btn-wish')
  const icon = $('wish-icon')
  btn.classList.toggle('active')
  icon.className = btn.classList.contains('active') ? 'ph ph-heart-fill' : 'ph ph-heart'
}

// ── GALLERY ──
function renderGallery(product) {
  const imgs = getImages(product)
  if (!imgs.length) return
  const mainImg = $('main-img')
  mainImg.src = imgs[0]; mainImg.alt = product.name
  const col = $('thumbs-col')
  col.innerHTML = ''
  const shown = Math.min(imgs.length, 3)
  for (let i = 1; i < shown; i++) {
    const isLast = i === 2 && imgs.length > 3
    const div = document.createElement('div')
    div.className = 'thumb'
    div.innerHTML = `<img src="${imgs[i]}" alt="Photo ${i + 1}"/>${isLast ? `<div class="thumb-more">+${imgs.length - 3}</div>` : ''}`
    div.addEventListener('click', () => { mainImg.src = imgs[i] })
    col.appendChild(div)
  }
  if (imgs.length === 1) {
    const div = document.createElement('div')
    div.className = 'thumb'
    div.innerHTML = `<img src="${imgs[0]}" alt="${product.name}" style="opacity:.4;filter:grayscale(30%)"/>`
    col.appendChild(div)
  }
}

// ── RENDER PRODUCT ──
function renderProduct(product) {
  currentProduct = product
  renderGallery(product)

  $('origin-badge').textContent = product.country ? `Produit du ${product.country}` : ''
  $('product-category').textContent = product.categories?.name || product.category || ''
  $('product-title').textContent = product.name
  $('product-price').textContent = formatPrice(product.price, product.currency || 'MAD')
  document.title = `${product.name} — WennaShop`

  if (product.compare_price && product.compare_price > product.price) {
    $('compare-price').textContent = formatPrice(product.compare_price, product.currency || 'MAD')
    $('compare-price').style.display = 'block'
  }

  $('product-description').textContent = product.description || 'Aucune description disponible.'

  // Chips
  const chips = []
  if (product.country) chips.push({ icon: 'ph-map-pin', label: `Origine : ${product.origin_city ? product.origin_city + ', ' : ''}${product.country}` })
  if (product.warranty) chips.push({ icon: 'ph-shield-check', label: `Garantie : ${product.warranty}` })
  if (product.stock !== undefined) chips.push({ icon: 'ph-package', label: product.stock > 0 ? `${product.stock} en stock` : 'Rupture de stock' })
  if (!chips.length) chips.push({ icon: 'ph-seal-check', label: 'Vendeur vérifié' })
  $('chips-container').innerHTML = chips.map(c => `<div class="chip"><i class="ph ${c.icon}"></i><span>${c.label}</span></div>`).join('')

  // Specs
  const specs = []
  if (product.brand) specs.push({ label: 'Marque', value: product.brand })
  if (product.material) specs.push({ label: 'Matière', value: product.material })
  if (product.weight) specs.push({ label: 'Poids', value: product.weight + 'g' })
  if (product.dimensions) specs.push({ label: 'Dimensions', value: product.dimensions })
  if (product.sku) specs.push({ label: 'Référence', value: product.sku })
  if (specs.length) {
    $('specs-grid').style.display = 'grid'
    $('specs-grid').innerHTML = specs.map(s => `<div class="spec-item"><div class="spec-label">${s.label}</div><div class="spec-value">${s.value}</div></div>`).join('')
  }

  // Tags
  const tags = Array.isArray(product.tags) ? product.tags : []
  if (tags.length) {
    $('tags-row').style.display = 'flex'
    $('tags-row').innerHTML = tags.map(t => `<span class="tag">${t}</span>`).join('')
  }

  $('skeleton-section').style.display = 'none'
  $('product-section').style.display = 'block'
}

// ── RENDER SELLER ──
function renderSeller(seller) {
  if (!seller) {
    $('seller-card').innerHTML = '<span style="font-size:13px;color:var(--text-muted);">Vendeur non disponible</span>'
    return
  }
  const initial = (seller.full_name || 'V').charAt(0).toUpperCase()
  const avatar = seller.avatar_url ? `<img src="${seller.avatar_url}" alt="${seller.full_name}"/>` : initial
  const since = seller.created_at ? new Date(seller.created_at).getFullYear() : null
  $('seller-card').innerHTML = `
    <div style="display:flex;align-items:center;gap:12px;">
      <div class="seller-av">${avatar}</div>
      <div>
        <div class="seller-name">${seller.full_name || 'Vendeur'}</div>
        <div class="seller-meta">Vendeur certifié${seller.country ? ' · ' + seller.country : ''}${since ? ' · Depuis ' + since : ''}</div>
      </div>
    </div>
    <a href="boutique.html?vendeur=${seller.id}" class="btn-seller">
      <i class="ph ph-storefront" style="font-size:15px;"></i>
      Voir la boutique
    </a>`
}

// ── RENDER REVIEWS ──
function renderReviews(reviews) {
  if (!reviews.length) return
  const avg = reviews.reduce((s, r) => s + (r.rating || 0), 0) / reviews.length
  $('rating-row').style.display = 'flex'
  $('avg-rating').textContent = avg.toFixed(1)
  $('review-count-inline').textContent = `(${reviews.length})`
  $('reviews-count').textContent = `${reviews.length} avis`
  $('reviews-section').style.display = 'block'
  $('reviews-list').innerHTML = reviews.map(r => {
    const date = r.created_at ? new Date(r.created_at).toLocaleDateString('fr-FR', { year: 'numeric', month: 'long' }) : ''
    const stars = '★'.repeat(Math.round(r.rating || 0)) + '☆'.repeat(5 - Math.round(r.rating || 0))
    return `<div class="review-card">
      <div class="review-header">
        <div><div class="reviewer">${r.reviewer_name || 'Acheteur anonyme'}</div><div class="stars">${stars}</div></div>
        <div class="review-date">${date}</div>
      </div>
      <div class="review-text">${r.comment || ''}</div>
    </div>`
  }).join('')
}

// ── RENDER RELATED ──
function renderRelated(products) {
  if (!products.length) return
  $('related-section').style.display = 'block'
  $('related-products').innerHTML = products.slice(0, 4).map(p => {
    const imgs = getImages(p)
    return `<a href="detail_produit.html?id=${p.id}" class="related-card">
      <div class="related-img">${imgs[0] ? `<img src="${imgs[0]}" alt="${p.name}" loading="lazy"/>` : ''}</div>
      <div class="related-info">
        <div class="related-country">${p.country || ''}</div>
        <div class="related-name">${p.name}</div>
        <div class="related-price">${formatPrice(p.price, p.currency || 'MAD')}</div>
      </div>
    </a>`
  }).join('')
}

// ── FETCH ──
async function loadProduct(id) {
  const db = getDb()
  const { data } = await db.from('products').select('*, categories(name)').eq('id', id).single()
  if (!data) return null
  const { data: imgs } = await db.from('product_images').select('url,position').eq('product_id', id).order('position')
  data._images = imgs || []
  return data
}
async function loadSeller(sellerId) {
  const { data } = await getDb().from('users').select('id,full_name,avatar_url,created_at,country').eq('id', sellerId).single()
  return data
}
async function loadReviews(productId) {
  const { data } = await getDb().from('reviews').select('*').eq('product_id', productId).eq('status', 'approved').order('created_at', { ascending: false })
  return data || []
}
async function loadRelated(categoryId, excludeId) {
  const { data } = await getDb().from('products').select('id,name,price,image_url,country,currency,category_id,images').eq('category_id', categoryId).neq('id', excludeId).eq('status', 'active').limit(4)
  return data || []
}

// ── INIT ──
async function init() {
  updateBadge()
  let tries = 0
  while (!getDb() && tries++ < 20) await new Promise(r => setTimeout(r, 100))
  const id = getProductId()
  if (!id) { $('skeleton-section').style.display = 'none'; $('error-state').style.display = 'flex'; return }
  const [product, reviews] = await Promise.all([loadProduct(id), loadReviews(id)])
  if (!product) { $('skeleton-section').style.display = 'none'; $('error-state').style.display = 'flex'; return }
  renderProduct(product)
  renderReviews(reviews)
  if (product.seller_id) loadSeller(product.seller_id).then(renderSeller)
  if (product.category_id) loadRelated(product.category_id, id).then(renderRelated)
}

document.addEventListener('DOMContentLoaded', init)
</script>
</body>
</html>
