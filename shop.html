<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>WennaShop — Boutique</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Serif:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<script>
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        "on-surface":"#171d17","surface-container-low":"#eff5eb","surface-container":"#eaf0e5",
        "surface-container-high":"#e4eae0","surface-container-highest":"#dee4da",
        "surface-container-lowest":"#ffffff","on-surface-variant":"#3f4a3e",
        "outline":"#6f7a6d","outline-variant":"#becaba","primary":"#006b2a",
        "primary-container":"#0f8739","on-primary":"#ffffff","on-primary-container":"#f7fff2",
        "secondary":"#1a5fa8","on-secondary":"#ffffff","tertiary":"#745b00",
        "on-tertiary":"#ffffff","background":"#f5fbf1","surface":"#f5fbf1",
      },
      borderRadius:{"DEFAULT":"1rem","lg":"2rem","xl":"3rem","full":"9999px"},
      fontFamily:{"headline":["Noto Serif"],"body":["Inter"],"label":["Inter"]}
    }

<style>
  .material-symbols-outlined {
    font-variation-settings:'FILL' 0,'wght' 300,'GRAD' 0,'opsz' 24;
  }
  .editorial-shadow { box-shadow: 0 8px 40px rgba(0,0,0,0.06); }
  body { min-height: 100dvh; }

  /* Skeleton loader */
  .skeleton {
    background: linear-gradient(90deg, #e4eae0 25%, #eff5eb 50%, #e4eae0 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
    border-radius: 0.75rem;
  }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

  /* Filter chip active */
  .chip { transition: all .2s; cursor: pointer; }
  .chip.active {
    background: #006b2a !important;
    color: #fff !important;
  }

  /* Card hover */
  .prod-card { transition: transform .2s; cursor: pointer; }
  .prod-card:hover { transform: translateY(-2px); }

  /* Scrollbar hide */
  .scrollbar-hide::-webkit-scrollbar { display: none; }
  .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
</style>
</head>

<body class="bg-background text-on-surface font-body">

<!-- Header -->
<header class="fixed top-0 w-full z-50 bg-emerald-50/80 backdrop-blur-xl shadow-sm">

        <span class="material-symbols-outlined">arrow_back</span>
      </a>
    </div>
    <h1 class="font-headline italic text-2xl tracking-tighter text-emerald-900">WennaShop</h1>
    <div class="flex items-center gap-4">
      <a href="panier.html" class="text-emerald-800 hover:opacity-80 transition-opacity">
        <span class="material-symbols-outlined">shopping_bag</span>
      </a>
    </div>
  </div>
</header>

<main class="pt-24 pb-32 px-6 max-w-7xl mx-auto">

  <!-- Header éditorial -->
  <section class="mb-10">
    <div class="flex flex-col gap-5">
      <h2 class="font-headline text-4xl md:text-5xl text-on-surface leading-tight">
        Curated <span class="italic text-primary">Heritage</span>
      </h2>

      <!-- Barre de recherche -->
      <div class="relative group">
        <div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-outline">
          <span class="material-symbols-outlined text-xl">search</span>

        <input
          id="search-input"

          placeholder="Rechercher des trésors..."
          type="text"
          oninput="handleSearch(this.value)"

      <!-- Chips pays -->

        <button class="chip flex-none px-6 py-2 rounded-full bg-secondary text-on-secondary text-sm font-medium active"
          data-country="" onclick="filterCountry('', this)">Tout</button>
        <button class="chip flex-none px-6 py-2 rounded-full bg-surface-container-highest text-on-surface-variant text-sm font-medium"
          data-country="Gabon" onclick="filterCountry('Gabon', this)">🇬🇦 Gabon</button>
        <button class="chip flex-none px-6 py-2 rounded-full bg-surface-container-highest text-on-surface-variant text-sm font-medium"
          data-country="Maroc" onclick="filterCountry('Maroc', this)">🇲🇦 Maroc</button>
        <!-- Chips catégories dynamiques -->
        <div id="category-chips" class="flex gap-3"></div>

  <!-- Grille produits -->
  <section id="products-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-x-4 gap-y-10 md:gap-x-8 md:gap-y-16">
    <!-- Skeletons de chargement -->
    <div class="skeleton aspect-[3/4]"></div>
    <div class="skeleton aspect-[3/4]"></div>
    <div class="skeleton aspect-[3/4] hidden md:block"></div>
    <div class="skeleton aspect-[3/4] hidden lg:block"></div>
  </section>

  <!-- État vide -->
  <div id="empty-state" class="hidden text-center py-24">
    <span class="material-symbols-outlined text-5xl text-outline/40 block mb-4">inventory_2</span>
    <p class="font-headline text-xl text-on-surface-variant">Aucun produit trouvé</p>
    <p class="text-sm text-outline mt-2">Essayez d'autres filtres ou revenez bientôt.</p>
    <button onclick="resetFilters()" class="mt-6 px-6 py-3 bg-primary text-on-primary rounded-xl text-sm font-medium">
      Voir tous les produits
    </button>
  </div>

  <!-- Newsletter -->

<script>
// ══════════════════════════════════════
// SUPABASE
// ══════════════════════════════════════
const SUPABASE_URL  = 'https://aakxoydznmybstfozjte.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFha3hveWR6bm15YnN0Zm96anRlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2MDQxMjAsImV4cCI6MjA5MTE4MDEyMH0.ncjxAvqVrxW75QJ4zcu0StOJsNtEZfY1SD48nRyJCs0';
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

// ── État des filtres ──────────────────
let allProducts   = [];
let activeCountry = '';
let activeCategory= '';
let searchQuery   = '';

// ══════════════════════════════════════
// INIT
// ══════════════════════════════════════
window.addEventListener('DOMContentLoaded', async () => {
  await Promise.all([loadCategories(), loadProducts()]);
});

// ══════════════════════════════════════
// CHARGEMENT CATÉGORIES (chips dynamiques)
// ══════════════════════════════════════
async function loadCategories() {
  try {
    const { data, error } = await db.from('categories').select('id, name').order('name');
    if (error || !data?.length) return;

    const container = document.getElementById('category-chips');
    container.innerHTML = data.map(c => `
      <button
        class="chip flex-none px-6 py-2 rounded-full bg-surface-container-highest text-on-surface-variant text-sm font-medium"
        data-category="${c.id}"
        onclick="filterCategory('${c.id}', this)">
        ${c.name}
      </button>
    `).join('');
  } catch(e) {
    console.warn('Catégories:', e.message);
  }
}

// ══════════════════════════════════════
// CHARGEMENT PRODUITS
// ══════════════════════════════════════
async function loadProducts() {
  showSkeletons();

  try {
    let query = db
      .from('products')
      .select('id, name, price, country, origin_city, image_url, stock, status, category_id, categories(name)')
      .eq('status', 'active')
      .order('created_at', { ascending: false });

    if (activeCountry)  query = query.eq('country', activeCountry);
    if (activeCategory) query = query.eq('category_id', activeCategory);

    const { data, error } = await query;

    if (error) {
      // Table inexistante → afficher produits de démo
      if (error.code === '42P01') {
        renderDemoProducts();
        return;
      }
      throw error;
    }

    allProducts = data || [];
    renderProducts(filterBySearch(allProducts));

  } catch(e) {
    console.error('Produits:', e.message);
    renderDemoProducts();
  }
}

// ══════════════════════════════════════
// FILTRES
// ══════════════════════════════════════
function filterCountry(val, btn) {
  activeCountry = val;
  // Reset chip catégorie
  activeCategory = '';
  document.querySelectorAll('[data-category]').forEach(b => b.classList.remove('active'));
  // Activer chip pays
  document.querySelectorAll('[data-country]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  loadProducts();
}

function filterCategory(val, btn) {
  activeCategory = (activeCategory === val) ? '' : val; // toggle
  document.querySelectorAll('[data-category]').forEach(b => b.classList.remove('active'));
  if (activeCategory) btn.classList.add('active');
  loadProducts();
}

function handleSearch(val) {
  searchQuery = val.toLowerCase().trim();
  renderProducts(filterBySearch(allProducts));
}

function filterBySearch(products) {
  if (!searchQuery) return products;
  return products.filter(p =>
    (p.name || '').toLowerCase().includes(searchQuery) ||
    (p.origin_city || '').toLowerCase().includes(searchQuery) ||
    (p.country || '').toLowerCase().includes(searchQuery)
  );
}

function resetFilters() {
  activeCountry = '';
  activeCategory = '';
  searchQuery = '';
  document.getElementById('search-input').value = '';
  document.querySelectorAll('[data-country]').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('[data-category]').forEach(b => b.classList.remove('active'));
  document.querySelector('[data-country=""]')?.classList.add('active');
  loadProducts();
}

// ══════════════════════════════════════
// RENDU PRODUITS
// ══════════════════════════════════════
function renderProducts(products) {
  const grid  = document.getElementById('products-grid');
  const empty = document.getElementById('empty-state');
  const count = document.getElementById('results-count');

  if (!products || products.length === 0) {
    grid.innerHTML  = '';
    empty.classList.remove('hidden');
    count.textContent = '';
    return;
  }

  empty.classList.add('hidden');
  count.textContent = `${products.length} produit${products.length > 1 ? 's' : ''}`;

  grid.innerHTML = products.map((p, i) => {
    const isNew     = isRecentProduct(p);
    const isLimited = p.stock !== null && p.stock <= 3 && p.stock > 0;
    const flag      = p.country === 'Gabon' ? '🇬🇦' : p.country === 'Maroc' ? '🇲🇦' : '';
    const offset    = (i === 2 || i === 3) ? 'md:mt-8' : '';

    return `
      <article class="prod-card group ${offset}" onclick="goToProduct('${p.id}')">
        <div class="relative aspect-[3/4] bg-surface-container-low rounded-lg overflow-hidden mb-4 editorial-shadow">

          ${p.image_url
            ? `<img
                src="${p.image_url}"
                alt="${escHtml(p.name)}"
                class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105"
                onerror="this.parentElement.classList.add('no-img');this.remove()"
              />`
            : `<div class="w-full h-full flex items-center justify-center text-outline/30">
                <span class="material-symbols-outlined text-5xl">image_not_supported</span>
               </div>`
          }

          ${isNew    ? `<span class="absolute top-4 left-4 px-3 py-1 bg-secondary text-on-secondary rounded-full text-[10px] font-bold uppercase tracking-widest">New</span>` : ''}
          ${isLimited? `<span class="absolute bottom-4 left-4 px-3 py-1 bg-tertiary text-on-tertiary rounded-full text-[10px] font-bold uppercase tracking-widest">Limited</span>` : ''}

          <button
            class="absolute top-4 right-4 w-10 h-10 rounded-full bg-surface-container-lowest/80 backdrop-blur-md flex items-center justify-center text-primary transition-all active:scale-90"
            onclick="event.stopPropagation(); toggleWish('${p.id}', this)"
            title="Favoris">
            <span class="material-symbols-outlined text-xl">favorite</span>
          </button>
        </div>

        <div class="flex flex-col gap-1">
          <span class="font-label text-[10px] uppercase tracking-[0.15em] text-outline">
            ${flag} ${escHtml(p.origin_city || p.country || '—')}
          </span>
          <h3 class="font-headline text-lg text-on-surface leading-tight">${escHtml(p.name)}</h3>
          ${p.categories?.name ? `<span class="text-[11px] text-outline-variant">${escHtml(p.categories.name)}</span>` : ''}
          <div class="flex justify-between items-end mt-2">
            <p class="font-body font-semibold text-primary">€${Number(p.price).toFixed(2)}</p>
            <button
              class="flex items-center gap-2 px-4 py-2 bg-gradient-to-br from-primary to-primary-container text-on-primary rounded-xl text-xs font-medium active:scale-90 transition-all"
              onclick="event.stopPropagation(); addToCart('${p.id}', '${escHtml(p.name)}')">
              <span class="material-symbols-outlined text-sm">add</span>
              Ajouter
            </button>
          </div>
        </div>
      </article>
    `;
  }).join('');
}

// ══════════════════════════════════════
// NAVIGATION VERS DÉTAIL
// ══════════════════════════════════════
function goToProduct(id) {
  if (id.startsWith('demo-')) {
    showToast('Créez la table products dans Supabase pour accéder aux détails', 'info');
    return;
  }
  window.location.href = `detail_produit.html?id=${id}`;
}

// ══════════════════════════════════════
// PANIER (localStorage)
// ══════════════════════════════════════
function addToCart(id, name) {
  const cart = JSON.parse(localStorage.getItem('wenna_cart') || '[]');
  const idx  = cart.findIndex(i => i.id === id);
  if (idx >= 0) { cart[idx].qty += 1; }
  else           { cart.push({ id, name, qty: 1 }); }
  localStorage.setItem('wenna_cart', JSON.stringify(cart));
  showToast(`${name} ajouté au panier ✓`, 'ok');
}

// ══════════════════════════════════════
// FAVORIS (localStorage)
// ══════════════════════════════════════
function toggleWish(id, btn) {
  const wishes = JSON.parse(localStorage.getItem('wenna_wishlist') || '[]');
  const icon   = btn.querySelector('.material-symbols-outlined');
  const idx    = wishes.indexOf(id);
  if (idx >= 0) {
    wishes.splice(idx, 1);
    icon.style.fontVariationSettings = "'FILL' 0,'wght' 300,'GRAD' 0,'opsz' 24";
  } else {
    wishes.push(id);
    icon.style.fontVariationSettings = "'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24";
    showToast('Ajouté aux favoris ♥', 'ok');
  }
  localStorage.setItem('wenna_wishlist', JSON.stringify(wishes));
}

// ══════════════════════════════════════
// NEWSLETTER
// ══════════════════════════════════════
async function subscribeNewsletter() {
  const email = document.getElementById('nl-email')?.value?.trim();
  const msg   = document.getElementById('nl-msg');
  if (!email) { showToast('Entrez votre email', 'ko'); return; }

  try {
    const { error } = await db.from('newsletter').insert([{ email, source: 'shop' }]);
    if (error) {
      if (error.code === '23505') { showToast('Email déjà inscrit ✓', 'ok'); return; }
      if (error.code === '42P01') { showToast('Newsletter bientôt disponible', 'ok'); return; }
      throw error;
    }
    showToast('Inscription confirmée ✓', 'ok');
    document.getElementById('nl-email').value = '';
  } catch(e) {
    showToast('Erreur : ' + e.message, 'ko');
  }
}

// ══════════════════════════════════════
// HELPERS
// ══════════════════════════════════════
function showSkeletons() {
  document.getElementById('products-grid').innerHTML = `
    <div class="skeleton aspect-[3/4]"></div>
    <div class="skeleton aspect-[3/4]"></div>
    <div class="skeleton aspect-[3/4] hidden md:block"></div>
    <div class="skeleton aspect-[3/4] hidden lg:block"></div>
  `;
  document.getElementById('empty-state').classList.add('hidden');
}

function isRecentProduct(p) {
  if (!p.created_at) return false;
  return (Date.now() - new Date(p.created_at).getTime()) < 7 * 24 * 60 * 60 * 1000;
}

function escHtml(str) {
  return String(str || '').replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])
  );
}

function showToast(msg, type = 'ok') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.background = type === 'ok' ? '#006b2a' : type === 'info' ? '#1a5fa8' : '#ba1a1a';
  el.style.opacity = '1';
  el.style.pointerEvents = 'auto';
  setTimeout(() => { el.style.opacity = '0'; el.style.pointerEvents = 'none'; }, 3000);
}
</script>
