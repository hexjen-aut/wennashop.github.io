<!DOCTYPE html>
<html class="light" lang="fr">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>WennaShop | Explorer</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Serif:ital,wght@0,400;0,700;0,900;1,900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
tailwind.config = {
  darkMode:"class",
  theme:{extend:{
    "colors":{
      "surface-container":"#eaf0e5","on-secondary-fixed-variant":"#004786","tertiary-fixed":"#ffe08b","on-primary-fixed-variant":"#00531f","inverse-primary":"#73dc84","on-tertiary-fixed-variant":"#584400","tertiary-fixed-dim":"#f0c110","surface":"#f5fbf1","secondary":"#1a5fa8","on-tertiary-fixed":"#241a00","inverse-surface":"#2c322b","on-secondary-fixed":"#001c3a","surface-dim":"#d6dcd2","on-primary-container":"#f7fff2","primary-fixed":"#8ff99d","secondary-container":"#78b0fe","surface-container-lowest":"#ffffff","secondary-fixed-dim":"#a6c8ff","on-tertiary":"#ffffff","inverse-on-surface":"#edf3e8","error-container":"#ffdad6","background":"#f5fbf1","surface-container-low":"#eff5eb","on-background":"#171d17","surface-bright":"#f5fbf1","surface-container-high":"#e4eae0","on-secondary-container":"#00427d","surface-tint":"#006e2b","on-secondary":"#ffffff","secondary-fixed":"#d4e3ff","on-primary":"#ffffff","error":"#ba1a1a","tertiary-container":"#d0a600","outline-variant":"#becaba","on-primary-fixed":"#002108","on-surface-variant":"#3f4a3e","surface-variant":"#dee4da","outline":"#6f7a6d","primary-container":"#0f8739","primary":"#006b2a","surface-container-highest":"#dee4da","tertiary":"#745b00","on-error":"#ffffff","on-tertiary-container":"#4f3d00","on-error-container":"#93000a","on-surface":"#171d17","primary-fixed-dim":"#73dc84"
    },
    "borderRadius":{"DEFAULT":"1rem","lg":"2rem","xl":"3rem","full":"9999px"},
    "fontFamily":{"headline":["Noto Serif"],"body":["Inter"],"label":["Inter"]}
  }}
}
</script>
<style>
  .material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 300,'GRAD' 0,'opsz' 24;}
  .hide-scrollbar::-webkit-scrollbar{display:none;}
  .hide-scrollbar{-ms-overflow-style:none;scrollbar-width:none;}
  body{min-height:max(884px,100dvh);}

  @keyframes shimmer{0%{background-position:-600px 0;}100%{background-position:600px 0;}}
  .skeleton{
    background:linear-gradient(90deg,#dde8d8 25%,#cdd8c8 50%,#dde8d8 75%);
    background-size:600px 100%;
    animation:shimmer 1.4s infinite linear;
    border-radius:0.75rem;
  }
</style>
<link rel="stylesheet" href="/css/wenna-palette-conversion.css">
</head>
<body class="bg-surface font-body text-on-surface antialiased">

<!-- TopAppBar — design original -->
<header class="fixed top-0 w-full z-50 bg-[#f5fbf1]/80 dark:bg-slate-900/80 backdrop-blur-xl flex justify-between items-center px-6 py-4 w-full">
  <div class="flex items-center gap-4">
    <button class="text-[#171d17] dark:text-slate-400 scale-95 active:scale-90 transition-transform">
      <span class="material-symbols-outlined">menu</span>
    </button>
    <h1 class="font-['Noto_Serif'] font-black italic text-[#006b2a] dark:text-[#0f8739] text-2xl tracking-tight">WennaShop</h1>
  </div>
  <div class="flex items-center gap-4">
    <a href="panier.html" class="text-[#171d17] dark:text-slate-400 scale-95 active:scale-90 transition-transform relative">
      <span class="material-symbols-outlined">shopping_bag</span>
      <span id="cart-badge" class="absolute -top-1 -right-1 bg-primary text-white text-[9px] font-bold w-4 h-4 rounded-full items-center justify-center hidden flex">0</span>
    </a>
  </div>
</header>

<main class="pt-24 pb-32 px-6 max-w-7xl mx-auto">

  <!-- Editorial Header — design original -->
  <section class="mb-12">
    <h2 class="font-headline text-5xl md:text-6xl font-bold text-primary mb-2 tracking-tight">Explore</h2>
    <p class="font-label text-sm uppercase tracking-[0.1em] text-on-surface-variant opacity-70">Curating the Heritage of Gabon &amp; Morocco</p>
  </section>

  <!-- Search & Filter — design original -->
  <section class="mb-12 space-y-8">

    <!-- Barre de recherche — design original -->
    <div class="relative flex items-center group">
      <span class="material-symbols-outlined absolute left-4 text-outline group-focus-within:text-primary transition-colors">search</span>
      <input
        id="search-input"
        class="w-full pl-12 pr-10 py-5 bg-surface-container-high border-b border-outline-variant/15 focus:border-primary focus:ring-0 rounded-t-lg font-body text-lg transition-all outline-none"
        placeholder="Rechercher des trésors..."
        type="text"
        autocomplete="off"
      />
      <button id="btn-clear" onclick="clearSearch()"
        class="absolute right-4 text-outline hover:text-on-surface transition-colors hidden">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>

    <!-- Catégories — design original (pills chargées dynamiquement) -->
    <div class="flex flex-col gap-4">
      <span class="font-label text-xs font-bold uppercase tracking-widest text-on-surface-variant">Catégories</span>
      <div id="cat-row" class="flex gap-3 overflow-x-auto hide-scrollbar pb-2">
        <button
          data-id=""
          onclick="selectCat(this)"
          class="cat-pill flex-shrink-0 px-8 py-3 bg-secondary text-on-secondary rounded-full font-label text-sm font-medium transition-all hover:opacity-90">
          All
        </button>
        <!-- Catégories Supabase injectées ici -->
      </div>
    </div>

    <!-- Origine + Prix — design original -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-8 pt-4">

      <!-- Origine -->
      <div class="bg-surface-container-low p-8 rounded-lg space-y-4">
        <h3 class="font-headline text-xl font-bold">Origine</h3>
        <div class="flex gap-4">
          <label class="flex-1 cursor-pointer group">
            <input class="hidden peer" type="checkbox" id="f-gabon" onchange="applyFilters()" />
            <div class="p-4 rounded-lg bg-surface-container-lowest text-center border-2 border-transparent peer-checked:border-primary peer-checked:bg-primary-fixed-dim/20 transition-all">
              <span class="block font-headline text-lg mb-1">Gabon</span>
              <span class="block font-label text-[10px] uppercase tracking-tighter opacity-60">Afrique Centrale</span>
            </div>
          </label>
          <label class="flex-1 cursor-pointer group">
            <input class="hidden peer" type="checkbox" id="f-maroc" onchange="applyFilters()" />
            <div class="p-4 rounded-lg bg-surface-container-lowest text-center border-2 border-transparent peer-checked:border-secondary peer-checked:bg-secondary-container/20 transition-all">
              <span class="block font-headline text-lg mb-1">Maroc</span>
              <span class="block font-label text-[10px] uppercase tracking-tighter opacity-60">Afrique du Nord</span>
            </div>
          </label>
        </div>
      </div>

      <!-- Prix -->
      <div class="bg-surface-container-low p-8 rounded-lg space-y-6">
        <div class="flex justify-between items-center">
          <h3 class="font-headline text-xl font-bold">Prix</h3>
          <span id="price-label" class="font-label text-sm font-semibold text-tertiary">0 – 50 000 MAD</span>
        </div>
        <!-- Double slider -->
        <div class="space-y-3">
          <input type="range" id="price-min" min="0" max="50000" value="0" step="100"
            class="w-full accent-primary cursor-pointer"
            oninput="updatePriceLabel()" onchange="applyFilters()" />
          <input type="range" id="price-max" min="0" max="50000" value="50000" step="100"
            class="w-full accent-primary cursor-pointer"
            oninput="updatePriceLabel()" onchange="applyFilters()" />
        </div>
        <div class="flex justify-between font-label text-[11px] uppercase tracking-widest text-on-surface-variant/60">
          <span>Min</span><span>Max</span>
        </div>
      </div>
    </div>

    <!-- Compteur résultats -->
    <div class="flex justify-between items-center pt-2">
      <span id="results-count" class="font-label text-sm text-on-surface-variant"></span>
      <button id="btn-reset" onclick="resetAll()"
        class="hidden font-label text-xs text-secondary underline underline-offset-2 hover:no-underline">
        Réinitialiser
      </button>
    </div>

  </section>

  <!-- Grille résultats — design original -->
  <section id="products-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-x-6 gap-y-12">
    <!-- Skeletons -->
    <div class="skeleton aspect-[3/4] rounded-lg"></div>
    <div class="skeleton aspect-[3/4] rounded-lg"></div>
    <div class="skeleton aspect-[3/4] rounded-lg"></div>
    <div class="skeleton aspect-[3/4] rounded-lg"></div>
  </section>

  <!-- Aucun résultat -->
  <div id="no-results" class="hidden flex flex-col items-center justify-center py-24 text-center gap-4">
    <span class="material-symbols-outlined text-5xl text-outline">search_off</span>
    <p class="font-headline text-xl font-bold">Aucun produit trouvé</p>
    <p class="text-on-surface-variant text-sm">Essayez d'autres mots-clés ou réinitialisez les filtres.</p>
    <button onclick="resetAll()" class="mt-2 px-6 py-2 rounded-full border border-outline-variant text-sm font-bold hover:bg-surface-container-high transition-colors">
      Réinitialiser
    </button>
  </div>

</main>

<!-- BottomNavBar — design original -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-6 pt-3 bg-[#f5fbf1]/80 dark:bg-slate-900/80 backdrop-blur-xl rounded-t-[2rem] z-50 shadow-[0_-8px_40px_rgba(23,29,23,0.06)]">
  <a href="index.html" class="flex flex-col items-center justify-center text-[#171d17]/60 dark:text-slate-400 scale-100 active:scale-97 transition-all duration-200">
    <span class="material-symbols-outlined">home</span>
    <span class="font-['Inter'] font-medium text-[11px] tracking-[0.05em] uppercase mt-1">Home</span>
  </a>
  <a href="recherche.html" class="flex flex-col items-center justify-center text-[#006b2a] dark:text-[#0f8739] font-bold">
    <span class="material-symbols-outlined">storefront</span>
    <span class="font-['Inter'] font-medium text-[11px] tracking-[0.05em] uppercase mt-1">Shop</span>
  </a>
  <a href="sell.html" class="flex flex-col items-center justify-center text-[#171d17]/60 dark:text-slate-400 scale-100 active:scale-97 transition-all duration-200">
    <span class="material-symbols-outlined">add_circle</span>
    <span class="font-['Inter'] font-medium text-[11px] tracking-[0.05em] uppercase mt-1">Sell</span>
  </a>
  <a href="compte.html" class="flex flex-col items-center justify-center text-[#171d17]/60 dark:text-slate-400 scale-100 active:scale-97 transition-all duration-200">
    <span class="material-symbols-outlined">person</span>
    <span class="font-['Inter'] font-medium text-[11px] tracking-[0.05em] uppercase mt-1">Profile</span>
  </a>
</nav>

<!-- ══════════════════════════════════
     SCRIPT SUPABASE
══════════════════════════════════ -->
<script>
  // ─── CONFIG ──────────────────────────────────────────────
  const SUPABASE_URL  = 'https://aakxoydznmybstfozjte.supabase.co'
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFha3hveWR6bm15YnN0Zm96anRlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2MDQxMjAsImV4cCI6MjA5MTE4MDEyMH0.ncjxAvqVrxW75QJ4zcu0StOJsNtEZfY1SD48nRyJCs0'
  // ─────────────────────────────────────────────────────────

  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON)

  // ─── État ────────────────────────────────────────────────
  let searchTerm    = ''
  let selectedCatId = ''
  let debounceTimer = null

  const $ = id => document.getElementById(id)

  function fmt(n, c = 'MAD') {
    return new Intl.NumberFormat('fr-FR', { style: 'currency', currency: c }).format(n)
  }

  // ─── Badge panier ────────────────────────────────────────
  function updateCartBadge() {
    const n = JSON.parse(localStorage.getItem('wenna_cart') || '[]').reduce((s,i) => s + i.qty, 0)
    const b = $('cart-badge')
    b.textContent = n
    n > 0 ? b.classList.remove('hidden') : b.classList.add('hidden')
  }

  // ─── Catégories depuis Supabase ──────────────────────────
  async function loadCategories() {
    const { data } = await sb.from('categories').select('id, name').order('name')
    if (!data) return
    const row = $('cat-row')
    data.forEach(cat => {
      const btn = document.createElement('button')
      btn.className = 'cat-pill flex-shrink-0 px-8 py-3 bg-surface-container-highest text-on-surface-variant rounded-full font-label text-sm font-medium hover:bg-secondary-container hover:text-on-secondary-container transition-all'
      btn.dataset.id = cat.id
      btn.textContent = cat.name
      btn.onclick = () => selectCat(btn)
      row.appendChild(btn)
    })
  }

  function selectCat(btn) {
    document.querySelectorAll('.cat-pill').forEach(b => {
      b.className = 'cat-pill flex-shrink-0 px-8 py-3 bg-surface-container-highest text-on-surface-variant rounded-full font-label text-sm font-medium hover:bg-secondary-container hover:text-on-secondary-container transition-all'
    })
    btn.className = 'cat-pill flex-shrink-0 px-8 py-3 bg-secondary text-on-secondary rounded-full font-label text-sm font-medium transition-all hover:opacity-90'
    selectedCatId = btn.dataset.id || ''
    search()
  }

  // ─── Prix ────────────────────────────────────────────────
  function updatePriceLabel() {
    const mn = parseInt($('price-min').value)
    const mx = parseInt($('price-max').value)
    $('price-label').textContent = `${mn.toLocaleString('fr-FR')} – ${mx.toLocaleString('fr-FR')} MAD`
  }

  function applyFilters() {
    updatePriceLabel()
    search()
  }

  // ─── Recherche ───────────────────────────────────────────
  $('search-input') && document.addEventListener('DOMContentLoaded', () => {
    $('search-input').addEventListener('input', e => {
      searchTerm = e.target.value.trim()
      $('btn-clear').classList.toggle('hidden', !searchTerm)
      $('btn-reset').classList.toggle('hidden', !searchTerm && !selectedCatId)
      clearTimeout(debounceTimer)
      debounceTimer = setTimeout(search, 350)
    })
  })

  function clearSearch() {
    $('search-input').value = ''
    searchTerm = ''
    $('btn-clear').classList.add('hidden')
    search()
  }

  function resetAll() {
    clearSearch()
    $('f-gabon').checked = false
    $('f-maroc').checked = false
    $('price-min').value = 0
    $('price-max').value = 50000
    updatePriceLabel()
    // Réactiver "All"
    document.querySelectorAll('.cat-pill').forEach((b, i) => {
      if (i === 0) {
        b.className = 'cat-pill flex-shrink-0 px-8 py-3 bg-secondary text-on-secondary rounded-full font-label text-sm font-medium transition-all hover:opacity-90'
        b.dataset.id = ''
      } else {
        b.className = 'cat-pill flex-shrink-0 px-8 py-3 bg-surface-container-highest text-on-surface-variant rounded-full font-label text-sm font-medium hover:bg-secondary-container hover:text-on-secondary-container transition-all'
      }
    })
    selectedCatId = ''
    $('btn-reset').classList.add('hidden')
    search()
  }

  // ─── Exécution recherche ─────────────────────────────────
  async function search() {
    showSkeletons()

    const gabon = $('f-gabon').checked
    const maroc = $('f-maroc').checked
    const country = (gabon && !maroc) ? 'Gabon' : (!gabon && maroc) ? 'Maroc' : null
    const pMin = parseInt($('price-min').value)
    const pMax = parseInt($('price-max').value)

    // ── 1. Essai RPC full-text (search_vector) ──────────────
    const { data, error } = await sb.rpc('search_products', {
      term:            searchTerm,
      country_filter:  country,
      category_filter: selectedCatId || null,
      price_min:       pMin,
      price_max:       pMax
    })

    if (error) {
      console.warn('RPC error, fallback ilike:', error.message)
      // ── 2. Fallback .ilike si RPC échoue ───────────────────
      let q = sb.from('products')
        .select('id, name, description, price, currency, country, origin_city, image_url, images, category_id')
        .eq('status', 'active')
        .gte('price', pMin)
        .lte('price', pMax)
      if (searchTerm)    q = q.ilike('name', `%${searchTerm}%`)
      if (country)       q = q.eq('country', country)
      if (selectedCatId) q = q.eq('category_id', selectedCatId)
      const { data: fb } = await q.order('created_at', { ascending: false })
      renderProducts(fb || [])
      return
    }

    renderProducts(data || [])
  }

  // ─── Skeletons ───────────────────────────────────────────
  function showSkeletons() {
    $('no-results').classList.add('hidden')
    $('products-grid').innerHTML = Array(8).fill(0).map(() => `
      <div class="group">
        <div class="skeleton aspect-[3/4] mb-6 rounded-lg"></div>
        <div class="skeleton h-3 w-16 mb-2 rounded"></div>
        <div class="skeleton h-5 w-4/5 mb-2 rounded"></div>
        <div class="skeleton h-4 w-24 rounded"></div>
      </div>`).join('')
  }

  // ─── Rendu produits — design original des cards ──────────
  function renderProducts(products) {
    const grid = $('products-grid')
    $('results-count').textContent = products.length
      ? `${products.length} produit${products.length > 1 ? 's' : ''} trouvé${products.length > 1 ? 's' : ''}`
      : ''

    if (!products.length) {
      grid.innerHTML = ''
      $('no-results').classList.remove('hidden')
      return
    }

    $('no-results').classList.add('hidden')

    grid.innerHTML = products.map((p, i) => {
      const imgs = Array.isArray(p.images) && p.images.length ? p.images : [p.image_url || '']
      const isMaroc  = p.country === 'Maroc'
      const badge    = isMaroc
        ? `<span class="px-3 py-1 bg-secondary text-on-secondary text-[10px] font-bold uppercase tracking-widest rounded-full">${p.country}</span>`
        : `<span class="px-3 py-1 bg-primary text-on-primary text-[10px] font-bold uppercase tracking-widest rounded-full">${p.country || ''}</span>`

      // Décalage éditorial sur col 3-4 comme design original
      const offset = (i % 4 === 2 || i % 4 === 3) ? 'md:mt-8' : ''
      const cur = p.currency || 'MAD'

      return `
        <article class="group ${offset}">
          <a href="detail_produit.html?id=${p.id}">
            <div class="relative aspect-[3/4] overflow-hidden rounded-lg bg-surface-container-lowest mb-6">
              ${imgs[0]
                ? `<img
                    class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110"
                    src="${imgs[0]}"
                    alt="${p.name}"
                    loading="lazy"
                  />`
                : `<div class="w-full h-full flex items-center justify-center bg-surface-container-high">
                     <span class="material-symbols-outlined text-4xl text-outline">image</span>
                   </div>`
              }
              <div class="absolute top-4 left-4">${badge}</div>
            </div>
            <div class="space-y-1 px-1">
              <span class="font-label text-[10px] uppercase tracking-widest text-on-surface-variant">${p.origin_city || ''}</span>
              <h3 class="font-headline text-lg font-bold leading-tight group-hover:text-primary transition-colors">${p.name}</h3>
              <p class="font-body text-sm font-medium text-primary">${fmt(p.price, cur)}</p>
            </div>
          </a>
        </article>`
    }).join('')
  }

  // ─── Init ────────────────────────────────────────────────
  async function init() {
    updateCartBadge()
    updatePriceLabel()

    // Attacher l'écouteur recherche
    $('search-input').addEventListener('input', e => {
      searchTerm = e.target.value.trim()
      $('btn-clear').classList.toggle('hidden', !searchTerm)
      $('btn-reset').classList.toggle('hidden', !searchTerm)
      clearTimeout(debounceTimer)
      debounceTimer = setTimeout(search, 350)
    })

    await loadCategories()
    await search()
  }

  document.addEventListener('DOMContentLoaded', init)
</script>

</body>
</html>
