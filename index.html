<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>WennaShop - Login / Sign Up</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;0,900;1,900&amp;family=Inter:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>

                    "on-tertiary": "#ffffff",
                    "inverse-on-surface": "#edf3e8",

                    "background": "#f5fbf1",
                    "surface-container-low": "#eff5eb",
                    "on-background": "#171d17",
                    "surface-bright": "#f5fbf1",
                    "surface-container-high": "#e4eae0",
                    "on-secondary-container": "#00427d",
                    "surface-tint": "#006e2b",

                    "error": "#ba1a1a",
                    "tertiary-container": "#d0a600",

                    "on-primary-fixed": "#002108",
                    "on-surface-variant": "#3f4a3e",
                    "surface-variant": "#dee4da",
                    "outline": "#6f7a6d",
                    "primary-container": "#0f8739",
                    "primary": "#006b2a",
                    "surface-container-highest": "#dee4da",
                    "tertiary": "#745b00",
                    "on-error": "#ffffff",
                    "on-tertiary-container": "#4f3d00",
                    "on-error-container": "#93000a",

            "borderRadius": {

                    "lg": "2rem",

                    "full": "9999px"

            "fontFamily": {

                    "body": ["Inter"],
                    "label": ["Inter"]

          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
            font-size: 20px;
        }
        .editorial-gradient {
            background: linear-gradient(135deg, #006b2a 0%, #0f8739 100%);
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f5fbf1;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="min-h-screen flex flex-col md:flex-row overflow-x-hidden">
<!-- Asymmetric Visual Anchor (Mobile: Top, Desktop: Left) -->
<div class="relative w-full md:w-5/12 lg:w-1/2 h-[353px] md:h-screen overflow-hidden">
<img alt="Visual Brand Story" class="absolute inset-0 w-full h-full object-cover" data-alt="high-end editorial close-up of lush tropical fern leaves layered with traditional Moroccan tile patterns in deep forest green and gold" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBgIEV3Z8FI_kBplU-v8C_dfV7ZQborpWKonq8b78QFDgCEEDdNkmkoUnWUZbOvbxvJav0X2KMGROBJaResC9473f0yhK2IQGYxdRcHFeWQEffTn6fDFmzIrA7zqYs7Ox4b8hiEKGz3jySZJzOUWo8xvohFBDjUF0D6GRHMU_jYuvWG1BQL9U6oJ9HSusYn5P1GlcuEuyAE1bR79MROVzY9PgjYY2ng7t3QaM8Oy-WMz-xWag9CXLI-7Fevxfr6h56lhb3xcbhdM_c"/>
<div class="absolute inset-0 editorial-gradient opacity-20"></div>
<div class="absolute inset-0 flex flex-col items-center justify-center p-8 text-center bg-black/10 backdrop-blur-sm md:backdrop-blur-none md:bg-transparent">
<h1 class="font-headline font-black italic text-5xl md:text-7xl text-on-primary-container tracking-tighter mb-4 drop-shadow-lg">WennaShop</h1>
<p class="font-label text-on-primary-container text-xs tracking-[0.2em] uppercase font-semibold">Bridging Gabon &amp; Morocco</p>
</div>
</div>
<!-- Auth Container -->
<main class="flex-1 flex flex-col justify-center items-center px-6 py-12 md:px-16 lg:px-24 bg-surface relative">
<div class="w-full max-w-md space-y-10">
<!-- Tab Switcher -->
<div class="flex justify-center p-1 bg-surface-container-high rounded-full w-fit mx-auto">
<button id="tab-connexion" onclick="showConnexion()" class="px-8 py-2.5 rounded-full text-sm font-label font-bold transition-all duration-200 bg-secondary text-on-secondary shadow-sm">Connexion</button>
<button id="tab-inscription" onclick="showInscription()" class="px-8 py-2.5 rounded-full text-sm font-label font-medium transition-all duration-200 text-on-surface-variant hover:text-on-surface">Inscription</button>
</div>
<!-- Header Text -->
<div class="text-center space-y-2">
<h2 id="form-title" class="font-headline text-3xl font-bold text-on-surface">Bon retour</h2>
<p id="form-subtitle" class="font-body text-on-surface-variant text-sm tracking-tight">Curating the finest heritage products for your home.</p>
</div>
<!-- Form Section -->
<form class="space-y-6">
<!-- Email Input -->
<div class="space-y-1">
<label class="font-label text-[10px] uppercase tracking-widest font-bold text-primary ml-2">Email Address</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">mail</span>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container-high border-b-2 border-outline-variant focus:border-primary focus:ring-0 transition-all font-body text-on-surface rounded-t-lg outline-none" placeholder="alex@example.com" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-1">
<div class="flex justify-between items-center px-2">
<label class="font-label text-[10px] uppercase tracking-widest font-bold text-primary">Password</label>
<a class="font-label text-[10px] uppercase tracking-widest font-medium text-secondary hover:underline" href="#">Forgot?</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">lock</span>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container-high border-b-2 border-outline-variant focus:border-primary focus:ring-0 transition-all font-body text-on-surface rounded-t-lg outline-none" placeholder="••••••••" type="password"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-outline cursor-pointer hover:text-on-surface">visibility</span>
</div>
</div>
<!-- Country Selection (Hidden for Connection, shown for Inscription - placeholder display) -->
<div class="space-y-1 opacity-50 pointer-events-none">
<label class="font-label text-[10px] uppercase tracking-widest font-bold text-outline ml-2">Heritage Origin (Sign up only)</label>
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 py-3 bg-surface-container-low border border-outline-variant/20 rounded-xl font-label text-sm text-on-surface-variant" type="button">
                            Gabon
                        </button>
<button class="flex items-center justify-center gap-2 py-3 bg-surface-container-low border border-outline-variant/20 rounded-xl font-label text-sm text-on-surface-variant" type="button">
                            Morocco
                        </button>
</div>
</div>
<!-- Main Action Button -->
<button id="submit-btn" onclick="handleSubmit(event)" class="w-full editorial-gradient py-5 rounded-xl text-on-primary font-label font-bold tracking-widest uppercase text-sm shadow-xl hover:shadow-2xl transition-all active:scale-95 duration-200" type="button">
                    Se connecter
                </button>
</form>
<!-- Divider -->
<div class="relative flex items-center py-4">
<div class="flex-grow border-t border-outline-variant/20"></div>
<span class="flex-shrink mx-4 font-label text-[10px] uppercase tracking-[0.2em] text-outline">or continue with</span>
<div class="flex-grow border-t border-outline-variant/20"></div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-1 gap-4">
<button class="flex items-center justify-center gap-3 w-full py-4 bg-surface-container-lowest border border-outline-variant/30 rounded-xl font-body font-medium text-on-surface hover:bg-surface-container-low transition-colors active:scale-97">
<img alt="Google" class="w-5 h-5" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAhFzAlcF8y2F9YWFWDaC5gHc9aKLfuZ-3cpoLBU1UpBmjW0khWMFwowGqCKb2Jc5TSN2bD4KupxtHkEDNzHou_9F8AkIPhUewaL63wqy-0twzfKrfqOfvlHXiZ-MCS81XHFFnVPzaL-rspOx6U9_gBkSCjkyqIMvySrt4VeNujqWEMUAIW8EQ-acfjfMtjATh3Mu-ytkPkOeQ-pdNX0J028d4KhxudfMDyNSZ42U5usiFgO9MwOd8z4jjUIFWmYMOIQDgLenr_Ap4"/>
<span>Sign in with Google</span>
</button>
</div>
<!-- Footer -->
<div class="text-center">
<p class="font-body text-xs text-on-surface-variant">
                    By continuing, you agree to WennaShop's 
                    <a class="text-secondary font-semibold hover:underline" href="#">Terms of Service</a> and 
                    <a class="text-secondary font-semibold hover:underline" href="#">Privacy Policy</a>.
                </p>
</div>
</div>
<!-- Floating Decorative Accent -->
<div class="hidden lg:block absolute bottom-12 right-12 opacity-5 pointer-events-none">
<span class="font-headline text-9xl italic font-black text-primary select-none">W</span>
</div>
</main>
<script>
  let currentMode = 'connexion';

  function showConnexion() {
    currentMode = 'connexion';
    document.getElementById('tab-connexion').className = 'px-8 py-2.5 rounded-full text-sm font-label font-bold transition-all duration-200 bg-secondary text-on-secondary shadow-sm';
    document.getElementById('tab-inscription').className = 'px-8 py-2.5 rounded-full text-sm font-label font-medium transition-all duration-200 text-on-surface-variant hover:text-on-surface';
    document.getElementById('form-title').textContent = 'Bon retour';
    document.getElementById('form-subtitle').textContent = 'Curating the finest heritage products for your home.';
    document.getElementById('submit-btn').textContent = 'Se connecter';
  }

  function showInscription() {
    currentMode = 'inscription';
    document.getElementById('tab-inscription').className = 'px-8 py-2.5 rounded-full text-sm font-label font-bold transition-all duration-200 bg-secondary text-on-secondary shadow-sm';
    document.getElementById('tab-connexion').className = 'px-8 py-2.5 rounded-full text-sm font-label font-medium transition-all duration-200 text-on-surface-variant hover:text-on-surface';
    document.getElementById('form-title').textContent = 'Créer un compte';
    document.getElementById('form-subtitle').textContent = 'Rejoignez la communauté WennaShop dès aujourd\'hui.';
    document.getElementById('submit-btn').textContent = 'Créer mon compte';
  }

  function handleSubmit(e) {
    e.preventDefault();
    if (currentMode === 'connexion') {
      window.location.href = 'hero.html';
    } else {
      window.location.href = 'inscription.html';
    }
  }
</script>
</body></html>
