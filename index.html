<!DOCTYPE html>
<html lang="fr" class="light">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>WennaShop — Connexion / Inscription</title>
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        "surface":"#f5fbf1","surface-container-low":"#eff5eb","surface-container":"#eaf0e5",
        "surface-container-high":"#e4eae0","surface-container-highest":"#dee4da",
        "surface-container-lowest":"#ffffff","on-surface":"#171d17",
        "on-surface-variant":"#3f4a3e","outline":"#6f7a6d","outline-variant":"#becaba",

<style>
  *, *::before, *::after { box-sizing: border-box; }
  .material-symbols-outlined { font-variation-settings:'FILL' 0,'wght' 300,'GRAD' 0,'opsz' 24; font-size:20px; }
  body { font-family:'Inter',sans-serif; background:#f5fbf1; min-height:100dvh; overflow-x:hidden; }
  h1,h2,h3 { font-family:'Noto Serif',serif; }

  .brand-gradient { background: linear-gradient(135deg, #006b2a 0%, #0f8739 100%); }

  /* ─── CLEF DU FIX : les panels ne sont PAS position:absolute
     Ils sont dans un wrapper qui affiche l'un OU l'autre via display ─── */
  #panel-connexion,
  #panel-inscription {
    display: block;
    width: 100%;
    /* Animation douce au changement */
    animation: fadeSlideIn .35s cubic-bezier(.4,0,.2,1) both;
  }

  #panel-connexion.hidden-panel,
  #panel-inscription.hidden-panel {
    display: none;
  }

  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ─── Input style système ─── */
  .w-input {
    width:100%; padding:.9rem 1rem .9rem 2.8rem;
    background:#e4eae0; border:none; border-bottom:2px solid #becaba;
    border-radius:.75rem .75rem 0 0; outline:none;
    font-size:.9rem; color:#171d17; font-family:'Inter',sans-serif;
    transition:border-color .2s;
  }
  .w-input:focus { border-bottom-color:#006b2a; }
  .w-input-plain { padding-left:1rem; }
  .input-icon {
    position:absolute; left:.75rem; top:50%;
    transform:translateY(-50%); color:#6f7a6d; pointer-events:none;
  }

  /* ─── Country / Role buttons ─── */
  .choice-btn {
    flex:1; display:flex; align-items:center; justify-content:center; gap:.4rem;
    padding:.75rem; border-radius:.75rem;
    border:1.5px solid rgba(190,202,186,0.4);
    background:#eff5eb; font-size:.82rem; color:#3f4a3e;
    transition:all .2s; cursor:pointer; font-family:'Inter',sans-serif;
  }
  .choice-btn.active {
    border-color:#006b2a; background:rgba(0,107,42,0.1);
    color:#006b2a; font-weight:600;
  }
  .role-btn {
    flex:1; display:flex; flex-direction:column; align-items:center; gap:.3rem;
    padding:.75rem; border-radius:.75rem;
    border:1.5px solid rgba(190,202,186,0.4);
    background:#eff5eb; font-size:.75rem; color:#3f4a3e;
    transition:all .2s; cursor:pointer; font-family:'Inter',sans-serif;
  }
  .role-btn.active {
    border-color:#1a5fa8; background:rgba(26,95,168,0.1);
    color:#1a5fa8; font-weight:600;
  }
  .role-btn .material-symbols-outlined { font-size:22px; }

  /* ─── Tab pill ─── */
  .tab-pill {
    padding:.6rem 1.5rem; border-radius:9999px;
    font-size:.82rem; font-weight:500; cursor:pointer;
    transition:all .2s; border:none; background:transparent;
    color:#3f4a3e; font-family:'Inter',sans-serif;
  }
  .tab-pill.active {
    background:#1a5fa8; color:#fff; font-weight:700;
    box-shadow:0 2px 8px rgba(26,95,168,.3);
  }

  /* ─── Submit button ─── */
  .btn-submit {
    width:100%; padding:1rem; border-radius:.875rem; border:none;
    cursor:pointer; background:linear-gradient(135deg,#006b2a,#0f8739);
    color:#fff; font-weight:700; letter-spacing:.1em; text-transform:uppercase;
    font-size:.85rem; font-family:'Inter',sans-serif;
    box-shadow:0 8px 24px rgba(0,107,42,.3); transition:all .2s;
    display:flex; align-items:center; justify-content:center; gap:.5rem;
  }
  .btn-submit:hover  { box-shadow:0 12px 32px rgba(0,107,42,.4); opacity:.93; }
  .btn-submit:active { transform:scale(.97); }
  .btn-submit:disabled { opacity:.5; cursor:not-allowed; }

  /* ─── Spinner ─── */
  .spinner {
    display:none; width:18px; height:18px; flex-shrink:0;
    border:2px solid rgba(255,255,255,.4); border-top-color:#fff;
    border-radius:50%; animation:spin .7s linear infinite;
  }
  @keyframes spin { to { transform:rotate(360deg); } }
  .is-loading .spinner   { display:block; }
  .is-loading .btn-label { display:none; }

  /* ─── Google button ─── */
  .btn-google {
    width:100%; padding:.9rem; border-radius:.875rem;
    border:1.5px solid rgba(190,202,186,.5);
    background:#fff; display:flex; align-items:center; justify-content:center; gap:.6rem;
    font-size:.85rem; font-weight:500; color:#171d17; cursor:pointer; transition:all .2s;
    font-family:'Inter',sans-serif;
  }
  .btn-google:hover { background:#eff5eb; }

  /* ─── Toast ─── */
  #toast {
    position:fixed; bottom:1.5rem; left:50%;
    transform:translateX(-50%) translateY(60px);
    padding:.75rem 1.5rem; border-radius:9999px;
    font-size:.82rem; font-weight:600; color:#fff;
    z-index:999; transition:transform .35s ease, opacity .35s ease;
    opacity:0; white-space:nowrap; pointer-events:none;
    font-family:'Inter',sans-serif;
  }
  #toast.show { transform:translateX(-50%) translateY(0); opacity:1; }
  #toast.ok   { background:#006b2a; }
  #toast.ko   { background:#ba1a1a; }

  /* ─── Password strength ─── */
  #pwd-bar { height:3px; border-radius:99px; transition:width .3s, background .3s; width:0; }
</style>
</head>

<script>
// ══════════════════════════════════════════════
// SUPABASE — Configuration WennaShop Production
// ══════════════════════════════════════════════
const SUPABASE_URL  = 'https://vkevqwfpzywrtvodoqli.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZrZXZxd2ZwenV3cnR2b2RvcWxpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDM5NTI5NDcsImV4cCI6MjA1OTUyODk0N30.sb_publishable_6ebPy4FcTquBE_cHpQaORw_Sra52_RZ';
// ⚠️ Remplacez SUPABASE_ANON par votre vraie clé anon depuis:
// Supabase Dashboard → Settings → API → anon public

let db = null;
try {
  const { createClient } = window.supabase;
  db = createClient(SUPABASE_URL, SUPABASE_ANON);
} catch(e) {
  console.warn('Supabase non disponible:', e.message);
}

// ─── Redirect si déjà connecté ────────────────
(async () => {
  if (!db) return;
  try {
    const { data: { session } } = await db.auth.getSession();
    if (session) window.location.href = 'hero.html';
  } catch(e) {}
})();

// ── État local ────────────────────────────────
let currentMode     = 'connexion';
let selectedCountry = null;
let selectedRole    = null;

// ══════════════════════════════════════════════
// SWITCH PANEL — le vrai fix de la superposition
// ══════════════════════════════════════════════
function switchMode(mode) {
  currentMode = mode;

  const panelCnx = document.getElementById('panel-connexion');
  const panelIns = document.getElementById('panel-inscription');
  const tabCnx   = document.getElementById('tab-cnx');
  const tabIns   = document.getElementById('tab-ins');

  if (mode === 'connexion') {
    // Montrer connexion, cacher inscription
    panelCnx.classList.remove('hidden-panel');
    panelIns.classList.add('hidden-panel');
    // Re-déclencher l'animation
    panelCnx.style.animation = 'none';
    panelCnx.offsetHeight; // reflow
    panelCnx.style.animation = '';

    tabCnx.classList.add('active');
    tabIns.classList.remove('active');
  } else {
    // Montrer inscription, cacher connexion
    panelIns.classList.remove('hidden-panel');
    panelCnx.classList.add('hidden-panel');
    // Re-déclencher l'animation
    panelIns.style.animation = 'none';
    panelIns.offsetHeight; // reflow
    panelIns.style.animation = '';

    tabIns.classList.add('active');
    tabCnx.classList.remove('active');
  }
}

// ─── Sélecteurs pays / rôle ───────────────────
function selectCountry(val) {
  selectedCountry = val;
  document.querySelectorAll('[data-country]').forEach(b =>
    b.classList.toggle('active', b.dataset.country === val)
  );
}
function selectRole(val) {
  selectedRole = val;
  document.querySelectorAll('[data-role]').forEach(b =>
    b.classList.toggle('active', b.dataset.role === val)
  );
}

// ─── Toggle visibilité mot de passe ──────────
function togglePwd(inputId, iconId) {
  const inp = document.getElementById(inputId);
  const ico = document.getElementById(iconId);
  inp.type = inp.type === 'password' ? 'text' : 'password';
  ico.textContent = inp.type === 'password' ? 'visibility' : 'visibility_off';
}

// ─── Force du mot de passe ───────────────────
function evalStrength(pwd) {
  const bar  = document.getElementById('pwd-bar');
  const hint = document.getElementById('pwd-hint');
  if (!bar) return;
  let score = 0;
  if (pwd.length >= 8)         score++;
  if (/[A-Z]/.test(pwd))       score++;
  if (/[0-9]/.test(pwd))       score++;
  if (/[^A-Za-z0-9]/.test(pwd)) score++;
  const levels = [
    { w:'0%',   bg:'transparent', msg:'' },
    { w:'25%',  bg:'#ba1a1a',     msg:'Faible' },
    { w:'50%',  bg:'#d0a600',     msg:'Moyen' },
    { w:'75%',  bg:'#0f8739',     msg:'Bon' },
    { w:'100%', bg:'#006b2a',     msg:'Excellent' },
  ];
  const l = levels[score] || levels[0];
  bar.style.width      = l.w;
  bar.style.background = l.bg;
  hint.textContent     = l.msg;
}

// ─── Toast ────────────────────────────────────
function toast(msg, type = 'ok') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className   = `show ${type}`;
  setTimeout(() => { el.className = type; }, 3500);
}

// ─── Loading state ────────────────────────────
function setLoading(btnId, on) {
  const btn = document.getElementById(btnId);
  if (!btn) return;
  btn.disabled = on;
  btn.classList.toggle('is-loading', on);
}

// ─── Validation ───────────────────────────────
function need(id, label) {
  const v = document.getElementById(id)?.value?.trim();
  if (!v) { toast(`Champ requis : ${label}`, 'ko'); return null; }
  return v;
}

// ══════════════════════════════════════════════
// CONNEXION
// ══════════════════════════════════════════════
async function handleConnexion() {
  const email = need('cnx-email', 'Email');
  const pwd   = need('cnx-pwd',   'Mot de passe');
  if (!email || !pwd) return;

  if (!db) {
    // Mode démo — accès direct sans Supabase
    toast('Connexion démo…');
    setTimeout(() => window.location.href = 'hero.html', 900);
    return;
  }

  setLoading('btn-cnx', true);
  try {
    const { data, error } = await db.auth.signInWithPassword({ email, password: pwd });
    if (error) throw error;
    toast('Connexion réussie ✓');
    setTimeout(() => window.location.href = 'hero.html', 900);
  } catch (err) {
    const msg = err.message === 'Invalid login credentials'
      ? 'Email ou mot de passe incorrect.'
      : (err.message || 'Erreur de connexion.');
    toast(msg, 'ko');
  } finally {
    setLoading('btn-cnx', false);
  }
}

// ══════════════════════════════════════════════
// INSCRIPTION
// ══════════════════════════════════════════════
async function handleInscription() {
  const prenom = need('ins-prenom', 'Prénom');
  const nom    = need('ins-nom',    'Nom');
  const email  = need('ins-email',  'Email');
  if (!prenom || !nom || !email) return;

  const pwd = document.getElementById('ins-pwd')?.value || '';
  if (pwd.length < 8)      { toast('Mot de passe : 8 caractères minimum', 'ko'); return; }
  if (!selectedCountry)    { toast("Sélectionnez votre pays d'origine", 'ko'); return; }
  if (!selectedRole)       { toast('Sélectionnez votre rôle', 'ko'); return; }
  if (!document.getElementById('cgu')?.checked) {
    toast('Acceptez les CGU pour continuer', 'ko'); return;
  }

  if (!db) {
    toast('Compte créé (démo) ✓');
    setTimeout(() => switchMode('connexion'), 1500);
    return;
  }

  setLoading('btn-ins', true);
  try {
    // 1 — Auth Supabase
    const { data: authData, error: authErr } = await db.auth.signUp({
      email,
      password: pwd,
      options: {
        data: {
          full_name:  `${prenom} ${nom}`,
          first_name: prenom,
          last_name:  nom,
          country:    selectedCountry,
          role:       selectedRole,
        }
      }
    });
    if (authErr) throw authErr;

    // 2 — Profil dans la table publique `users`
    if (authData?.user) {
      await db.from('users').upsert({
        id:         authData.user.id,
        email,
        first_name: prenom,
        last_name:  nom,
        full_name:  `${prenom} ${nom}`,
        country:    selectedCountry,
        role:       selectedRole,
        status:     'active',
      }, { onConflict: 'id' });
    }

    toast('Compte créé ! Vérifiez votre email ✓');
    setTimeout(() => switchMode('connexion'), 2000);

  } catch (err) {
    const msg = err.message?.includes('already registered')
      ? 'Cet email est déjà utilisé.'
      : (err.message || "Erreur lors de l'inscription.");
    toast(msg, 'ko');
  } finally {
    setLoading('btn-ins', false);
  }
}

// ══════════════════════════════════════════════
// GOOGLE OAUTH
// ══════════════════════════════════════════════
async function handleGoogle() {
  if (!db) { toast('Supabase non configuré', 'ko'); return; }
  const { error } = await db.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.origin + '/hero.html' }
  });
  if (error) toast(error.message, 'ko');
}

// ══════════════════════════════════════════════
// RESET MOT DE PASSE
// ══════════════════════════════════════════════
async function sendReset() {
  const email = document.getElementById('cnx-email')?.value?.trim();
  if (!email) { toast('Entrez votre email pour réinitialiser', 'ko'); return; }
  if (!db)    { toast('Supabase non configuré', 'ko'); return; }
  const { error } = await db.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin + '/index.html'
  });
  if (error) toast(error.message, 'ko');
  else       toast('Email de réinitialisation envoyé ✓');
}
</script>
